  }

  function renderAll() {
    renderHero()
    renderProgress()
    renderQueue()
    renderMessages()
    renderControls()
    renderOverlay()
    renderThemePreview()
  }

  function setLocalQueue(items) {
    localQueue = Array.isArray(items) ? items.slice() : []
    state.queue = localQueue.slice()
    renderQueue()
    if (!audio.src && localQueue.length > 0) {
      state.currentTrack = localQueue[0].song_info || null
      renderHero()
      renderControls()
    }
    const validKeys = new Set((localQueue || []).map(item =>
      item?.song_info ? item.song_info.name + '::' + item.song_info.artist : ''
    ).filter(Boolean))
    for (const key of prefetchCache.keys()) {
      if (!validKeys.has(key)) prefetchCache.delete(key)
    }
  }

  async function sendFeedback(action) {
    if (!state.currentTrack || !state.currentTrack.name || !state.currentTrack.artist) return
    try {
      const response = await fetch('/api/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action,
          song_id: state.currentTrack.id,
          name: state.currentTrack.name,
          artist: state.currentTrack.artist,
        }),
      })
      const data = await response.json()
      if (!response.ok) throw new Error(data.error || 'feedback failed')
      state.currentFeedback = data.feedback || null
      renderControls()
      if (action === 'dislike') {
        appendDj(`记下了，${state.currentTrack.name} 之后不再推荐。`)
        advanceToNext()
      }
    } catch {
      appendDj('这次偏好记录失败了，稍后再试。')
    }
  }

  async function refreshCurrentFeedback() {
    if (!state.currentTrack || !state.currentTrack.name || !state.currentTrack.artist) {
      state.currentFeedback = null
      renderControls()
      return
    }
    try {
      const query = new URLSearchParams({
        song_id: state.currentTrack.id || '',
        name: state.currentTrack.name,
        artist: state.currentTrack.artist,
      })
      const response = await fetch(`/api/feedback?${query.toString()}`)
      const data = await response.json()
      state.currentFeedback = data.feedback || null
      renderControls()
    } catch {}
  }

  function appendMessage(message) {
    state.messages.push(message)
    renderMessages()
  }

  function appendDj(text, audioUrl) {
    if (!text) return
    appendMessage({
      id: makeId('dj'),
      from: 'dj',
      text,
      time: ts(),
      replayUrl: audioUrl || null,
    })
  }

  function appendCommentary(text, audioUrl) {
    if (!text) return
    appendMessage({
      id: makeId('commentary'),
      kind: 'commentary',
      from: 'dj',
      text,
      time: ts(),
      replayUrl: audioUrl || null,
    })
  }

  function appendUser(text) {
    appendMessage({ id: makeId('user'), from: 'user', text, time: ts() })
  }

  function playSong(item, options = {}) {
    const recordHistory = options.recordHistory !== false
    const autoExplain = options.autoExplain !== false
    if (!item || !item.play_url) return
    activeExplainToken += 1
    stopVoicePlayback()
    if (recordHistory && state.currentTrack && state.currentTrack.name && audio.src) {
      playedHistory.push({ song_info: state.currentTrack, play_url: audio.src })
      if (playedHistory.length > 30) playedHistory = playedHistory.slice(-30)
    }
    audio.src = item.play_url
    audio.play().then(() => {
      state.playing = true
      renderControls()
    }).catch((error) => {
      state.playing = false
      renderControls()
      appendDj(`播放失败：${error && error.name ? error.name : 'AudioError'}`)
    })
    state.currentTrack = item.song_info || null
    state.progress = 0
    state.heroCommentary = ''
    renderHero()
    renderQueue()
    renderProgress()
    if (autoExplain) {
      maybeAutoExplain(item)
    }
    setTimeout(prefetchNextExplain, 2000)
  }

  function cleanupVoiceDucking() {
    if (!commentaryDucking) return
    audio.volume = commentaryDucking.previous
    state.volume = commentaryDucking.previous
    commentaryDucking = null
  }

  function stopVoicePlayback() {
    app.classList.remove('dj-speaking')
    if (!commentaryAudio) return
    commentaryAudio.pause()
    commentaryAudio = null
    cleanupVoiceDucking()
    state.isExplaining = false
    renderControls()
  }

  function ensurePrimaryPlayback() {
    if (!audio.src) {
      if (localQueue.length > 0) advanceToNext()
      return
    }
    if (audio.paused) {
      audio.play().then(() => {
        state.playing = true
        renderControls()
      }).catch((error) => {
        state.playing = false
        renderControls()
        appendDj(`播放失败：${error && error.name ? error.name : 'AudioError'}`)
      })
    }
  }

  function playVoice(url, duckMusic, onFinish) {
    if (!url) return
    stopVoicePlayback()
    const voice = new Audio(url)
    commentaryAudio = voice
    if (duckMusic) {
      const previous = state.volume
      const lowered = Math.max(0, Math.min(1, previous * 0.7))
      audio.volume = lowered
      state.volume = lowered
      commentaryDucking = { previous }
      state.isExplaining = true
      renderControls()
    }

    function activateSpeaking() {
      if (commentaryAudio === voice) app.classList.add('dj-speaking')
    }

    function restore() {
      if (commentaryAudio === voice) commentaryAudio = null
      app.classList.remove('dj-speaking')
      cleanupVoiceDucking()
      state.isExplaining = false
      renderControls()
      if (typeof onFinish === 'function') onFinish()
    }

    voice.addEventListener('play', activateSpeaking, { once: true })
    voice.addEventListener('ended', restore, { once: true })
    voice.addEventListener('error', restore, { once: true })
    voice.play().then(() => activateSpeaking()).catch(() => restore())
  }

  async function fetchServerNext() {
    const response = await fetch('/api/next')
    const data = await response.json()
    if (data && data.play_url) {
      playSong(data)
      return true
    }
    return false
  }

  const prefetchCache = new Map()

  async function prefetchNextExplain() {
    if (localQueue.length === 0) return
    const next = localQueue[0]
    if (!next?.song_info) return
    const key = next.song_info.name + '::' + next.song_info.artist
    if (prefetchCache.has(key)) return
    try {
      const res = await fetch('/api/explain', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: next.song_info.name,
          artist: next.song_info.artist,
          user_input: '无',
          theme_name: state.themeKey || '深夜',
        }),
      })
      const data = await res.json()
      if (data.explain_text) {
        prefetchCache.set(key, {
          explain_text: data.explain_text,
          say_audio: data.say_audio || null,
        })
      }
    } catch {}
  }

  async function advanceToNext() {
    hasUnlockedAudio = true

    // 低水位触发：队列剩余少于3首时，静默向服务端请求补充
    if (localQueue.length <= 3) {
      fetch('/api/next?peek=1').catch(() => {})
    }

    if (localQueue.length > 0) {
      const next = localQueue.shift()
      state.queue = localQueue.slice()
      renderQueue()
      playSong(next)
      return
    }

    // 本地队列空了，从服务端取
    try {
      const ok = await fetchServerNext()
      if (!ok) {
        // 服务端也没有，主动触发 DJ 重新选曲
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ input: '继续播' }),
        })
        const data = await res.json()
        if (data.queue && data.queue.length > 0) {
          setLocalQueue(data.queue)
          if (data.say) appendDj(data.say)
          if (data.say_audio) playVoice(data.say_audio, true)
          else advanceToNext()
        }
      }
    } catch {}
  }

  function playPrevious() {
    hasUnlockedAudio = true
    if (state.progress > 3) {
      audio.currentTime = 0
      return
    }
    const previous = playedHistory.pop()
    if (!previous) {
      audio.currentTime = 0
      return
    }
    playSong(previous, { recordHistory: false })
  }

  async function loadInitialState() {
    const responses = await Promise.all([fetch('/api/now'), fetch('/api/queue')])
    const nowData = await responses[0].json()
    const queueData = await responses[1].json()

    if (nowData.current) {
      state.currentTrack = {
        id: nowData.current.song_id,
        name: nowData.current.song_name,
        artist: nowData.current.artist,
      }
    }
    state.currentFeedback = nowData.current_feedback || null

    state.weather = nowData.weather || null
    state.astronomy = nowData.astronomy || buildFallbackAstronomy()
    state.canvasHint = state.astronomy?.canvasHintActive || null
    setCanvasHint(state.canvasHint)
    state.sunrise = nowData.sunrise || null
    state.sunset = nowData.sunset || null
    state.sunriseTs = nowData.sunrise_ts || nowData.weather?.sunriseTs || null
    state.sunsetTs = nowData.sunset_ts || nowData.weather?.sunsetTs || null
    const visualTheme = getInterpolatedThemeState(Date.now())
    state.themeKey = visualTheme.themeKey
    setTheme(visualTheme.themeState, visualTheme.themeKey)
    startWeatherSystem(nowData.weather || null, state.astronomy)

    if (Array.isArray(queueData.queue)) setLocalQueue(queueData.queue)

    if ((!audio.src || audio.paused) && Array.isArray(queueData.queue) && queueData.queue.length > 0 && !hasUnlockedAudio) {
      state.showStartOverlay = true
      renderOverlay()
    }

    renderAll()
    if (!state.currentFeedback) refreshCurrentFeedback()
  }

  function connectWs() {
    ws = new WebSocket(`ws://${location.host}/stream`)

    ws.onopen = () => {
      state.connected = true
    }

    ws.onclose = () => {
      state.connected = false
      wsReconnectTimer = setTimeout(connectWs, 3000)
    }

    ws.onerror = () => {
      state.connected = false
      try { ws.close() } catch {}
    }

    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data)
        if (data.type === 'now-playing' && data.song_info) {
          state.currentTrack = data.song_info
          state.currentFeedback = null
          state.heroCommentary = ''
          renderHero()
          renderControls()
          refreshCurrentFeedback()
        }
        if (data.type === 'queue-refresh' && Array.isArray(data.queue)) {
          setLocalQueue(data.queue)
        } else if (Array.isArray(data.queue)) {
          setLocalQueue(data.queue)
        }
        if (data.sunrise) state.sunrise = data.sunrise
        if (data.sunset) state.sunset = data.sunset
        if (data.sunrise_ts) state.sunriseTs = data.sunrise_ts
        if (data.sunset_ts) state.sunsetTs = data.sunset_ts
        if (data.weather) {
          state.weather = data.weather
          startWeatherSystem(state.weather, state.astronomy)
          renderHero()
        }
        if (data.type === 'playlist-ready') {
          stationPayload = data
        }
        if (data.type === 'playlist-ready' && data.say) {
          const signature = JSON.stringify({
            say: data.say,
            say_audio: data.say_audio || null,
            queue: Array.isArray(data.queue) ? data.queue.map((item) => item.song_info && item.song_info.id ? item.song_info.id : (item.play_url || '')) : [],
          })
          if (lastPlaylistSignature !== signature) {
            lastPlaylistSignature = signature
            appendDj(data.say, data.say_audio || null)
            if (hasUnlockedAudio && !state.showStartOverlay) {
              ensurePrimaryPlayback()
              if (data.say_audio) {
                setTimeout(() => playVoice(data.say_audio, true), audio.src ? 180 : 260)
              }
            }
          }
        }
      } catch {}
    }
  }

  async function send() {
    const text = composerInput.value.trim()
    if (!text || state.isLoading) return
    hasUnlockedAudio = true
    state.showStartOverlay = false
    state.isLoading = true
    renderOverlay()
    renderControls()
    appendUser(text)
    composerInput.value = ''
    renderControls()

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ input: text }),
      })
      const data = await response.json()
      if (Array.isArray(data.queue)) setLocalQueue(data.queue)
      if (data.say) appendDj(data.say, data.say_audio || null)
      ensurePrimaryPlayback()
      if (data.say_audio) {
        setTimeout(() => playVoice(data.say_audio, true), audio.src ? 180 : 260)
      }
    } catch {
      appendDj('出了点问题，稍后再试。')
    } finally {
      state.isLoading = false
      renderControls()
    }
  }

  async function explainCurrentTrack() {
    if (state.currentTrack) {
      const key = state.currentTrack.name + '::' + state.currentTrack.artist
      const cached = prefetchCache.get(key)
      if (cached) {
        appendCommentary(cached.explain_text)
        if (cached.say_audio) playVoice(cached.say_audio, true)
        prefetchCache.delete(key)
        return
      }
    }
    return explainTrack(state.currentTrack, {})
  }

  async function explainTrack(track, options = {}) {
    const {
      userInput = '无',
      suppressFailureBubble = false,
    } = options

    if (!track || !track.name || !track.artist || state.isExplaining) return
    const requestToken = ++activeExplainToken
    const requestedTrackKey = makeTrackKey(track)
    hasUnlockedAudio = true
    state.showStartOverlay = false
    renderOverlay()
    try {
      const response = await fetch('/api/explain', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: track.name,
          artist: track.artist,
          theme_name: VISUAL_PHASES[state.themeKey].name,
          user_input: userInput,
        }),
      })
      const data = await response.json()
      if (!response.ok) throw new Error(data.error || 'Explain failed')
      if (requestToken !== activeExplainToken) return
      if (requestedTrackKey !== makeTrackKey(state.currentTrack)) return
      state.heroCommentary = data.explain_text || ''
      renderHero()
      appendCommentary(data.explain_text, data.say_audio || null)
      if (data.say_audio) playVoice(data.say_audio, true)
    } catch {
      if (requestToken !== activeExplainToken) return
      if (!suppressFailureBubble) appendDj('这段讲解暂时没生成出来。')
      state.isExplaining = false
      renderControls()
    }
  }

  function maybeAutoExplain(item) {
    if (!hasUnlockedAudio || state.isExplaining || !item || !item.song_info) return
    const role = item.queue_meta && item.queue_meta.batch_role
    if (role !== 'first' && role !== 'last') return

    const explainKey = makeTrackExplainKey(item)
    if (!explainKey || autoExplainedTracks.has(explainKey)) return
    autoExplainedTracks.add(explainKey)

    const themeName = VISUAL_PHASES[state.themeKey] ? VISUAL_PHASES[state.themeKey].name : ''
    let userInput = '无'

    if (role === 'first' && (themeName === '日出' || themeName === '上午')) {
      userInput = '这是今天最早开始的一首歌，如果自然的话，用一句轻一点的早上好带入。'
    } else if (role === 'last' && themeName === '深夜') {
      userInput = '这是这一批里最晚的一首歌，如果自然的话，用一句很轻的晚安收尾。'
    } else if (role === 'first') {
      userInput = '这是这一批里最早开始播放的一首歌，请自然开场。'
    } else if (role === 'last') {
      userInput = '这是这一批里最晚播放的一首歌，请自然收束一下情绪。'
    }

    setTimeout(() => {
      explainTrack(item.song_info, {
        userInput,
        suppressFailureBubble: true,
      })
    }, 1200)
  }

  function togglePlay() {
    hasUnlockedAudio = true
    state.showStartOverlay = false
    renderOverlay()
    if (commentaryAudio && !audio.src && localQueue.length > 0) {
      stopVoicePlayback()
    }
    if (!audio.src) {
      advanceToNext()
      return
    }
    if (audio.paused) audio.play().catch(() => {})
    else audio.pause()
  }

  function seekTo(event) {
    if (!state.duration) return
    const rect = event.currentTarget.getBoundingClientRect()
    audio.currentTime = ((event.clientX - rect.left) / rect.width) * state.duration
  }

  function pickQueue(index) {
    hasUnlockedAudio = true
    state.showStartOverlay = false
    renderOverlay()
    const picked = localQueue[index]
    if (!picked) return
    const nextQueue = localQueue.filter((_, idx) => idx !== index)
    localQueue = nextQueue
    state.queue = nextQueue.slice()
    renderQueue()
    playSong(picked)
  }

  function startListening() {
    hasUnlockedAudio = true
    state.showStartOverlay = false
    renderOverlay()
    ensurePrimaryPlayback()
    if (stationPayload && stationPayload.say_audio) {
      setTimeout(() => playVoice(stationPayload.say_audio, true), audio.src ? 180 : 260)
      return
    }
    ensurePrimaryPlayback()
  }

  const visualState = {
    width: 0,
    height: 0,
    heroClipHeight: 0,
    dpr: 1,
    phaseSeeds: {},
    starField: null,
    cloudSystem: [],
    currentWeatherProfile: null,
    previousWeatherProfile: null,
    weatherTransitionStart: 0,
    weatherSignature: '',
    lastFrameAt: 0,
    lastClockSecond: '',
    lastWeatherFetchAt: 0,
    fetchingAmbient: false,
    flashUntil: 0,
    hintActivatedAt: 0,
    canvasHintKey: null,
    canvasHintSeeds: {},
  }

  const HERO_MAX_RATIO = 0.70

  function rand(min, max) {
    return min + Math.random() * (max - min)
  }

  function heroMaxY() {
    return visualState.height * HERO_MAX_RATIO
  }

  function randomHeroY(minRatio = 0.05, maxRatio = 0.95) {
    return rand(visualState.height * minRatio, heroMaxY() * maxRatio)
  }

  function clampHeroY(y) {
    return Math.max(0, Math.min(heroMaxY(), y))
  }

  function withHeroClip(drawer) {
    const limit = heroMaxY()
    ctx.save()
    ctx.beginPath()
    ctx.rect(0, 0, visualState.width, limit)
    ctx.clip()
    drawer(limit)
    ctx.restore()
  }

  function fillRadialGradientBounds(cx, cy, radius, width = visualState.width, clipHeight = visualState.heroClipHeight || visualState.height) {
    const left = Math.max(0, cx - radius)
    const top = Math.max(0, cy - radius)
    const right = Math.min(width, cx + radius)
    const bottom = Math.min(clipHeight, cy + radius)
    const rectWidth = Math.max(0, right - left)
    const rectHeight = Math.max(0, bottom - top)
    if (rectWidth <= 0 || rectHeight <= 0) return
    ctx.fillRect(left, top, rectWidth, rectHeight)
  }

  function estimateFallbackSolarAltitude(hourOfDay) {
    if (hourOfDay < 6 || hourOfDay > 18) return -8
    const progress = (hourOfDay - 6) / 12
    return Math.sin(progress * Math.PI) * 70
  }

  function buildFallbackAstronomy(nowMs = Date.now()) {
    const now = new Date(nowMs)
    const hourOfDay = now.getHours() + now.getMinutes() / 60
    const solarAltitude = estimateFallbackSolarAltitude(hourOfDay)
    const dayProgress = clamp((hourOfDay - 6) / 12, 0, 1)
    const isDaytime = hourOfDay >= 6 && hourOfDay < 18
    const isNight = !isDaytime
    const lunarAltitude = 35
    return {
      solar: {
        altitude: solarAltitude,
        azimuth: 60 + dayProgress * 240,
        phase: isDaytime
          ? (hourOfDay < 8 ? 'sunrise' : hourOfDay < 12 ? 'morning' : hourOfDay < 15 ? 'noon' : 'afternoon')
          : 'night',
      },
      lunar: {
        phase: 0.3705,
        phaseName: 'waxing_gibbous',
        illumination: 0.84,
        altitude: lunarAltitude,
        isVisible: lunarAltitude > 0,
      },
      stars: {
        visibility: isNight ? 0.68 : 0,
      },
      canvasHintActive: null,
    }
  }

  function normalizeAstronomy(astronomy, nowMs = Date.now()) {
    return astronomy || buildFallbackAstronomy(nowMs)
  }

  function resizeCanvas() {
    const rect = app.getBoundingClientRect()
    const dpr = window.devicePixelRatio || 1
    visualState.width = rect.width
    visualState.height = rect.height
    visualState.heroClipHeight = rect.height * 0.72
    visualState.dpr = dpr
    canvas.width = rect.width * dpr
    canvas.height = rect.height * dpr
    canvas.style.width = `${rect.width}px`
    canvas.style.height = `${rect.height}px`
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
    initPhaseSeeds()
    initStarField()
    if (state.weather) startWeatherSystem(state.weather, state.astronomy, true)
  }

  function initPhaseSeeds() {
    const width = visualState.width
    const height = visualState.height
    visualState.phaseSeeds = {
      morningGlows: Array.from({ length: 5 }, () => ({
        x: rand(width * 0.05, width * 0.95),
        y: rand(height * 0.05, height * 0.62),
        vx: rand(0.06, 0.14) * (Math.random() < 0.5 ? 1 : -1),
        vy: rand(0.04, 0.1) * (Math.random() < 0.5 ? 1 : -1),
        radius: rand(width * 0.18, width * 0.32),
        hue: rand(30, 55),
        alpha: rand(0.06, 0.11),
      })),
      noonRays: Array.from({ length: 4 }, (_, index) => ({
        x: width * (0.15 + index * 0.22),
        baseAlpha: rand(0.04, 0.08),
        phase: rand(0, Math.PI * 2),
        speed: rand(3000, 6000),
      })),
      nightGlows: Array.from({ length: 3 }, () => ({
        x: rand(width * 0.1, width * 0.9),
        y: rand(height * 0.05, height * 0.60),
        vx: rand(0.03, 0.08) * (Math.random() < 0.5 ? 1 : -1),
        vy: rand(0.02, 0.06) * (Math.random() < 0.5 ? 1 : -1),
        radius: rand(width * 0.35, width * 0.55),
        color: Math.random() < 0.6 ? '#1A2A4A' : '#2A1A08',
        alpha: rand(0.08, 0.14),
      })),
    }
    if (visualState.canvasHintKey) {
      initCanvasHintSeeds(visualState.canvasHintKey)
    }
  }

  function initStarField() {
    const width = visualState.width
    const height = visualState.height

    visualState.starField = {
      bright: Array.from({ length: 12 }, () => ({
        x: rand(0, width),
        y: rand(0, heroMaxY() * 0.8),
        size: rand(1.4, 2.2),
        baseAlpha: rand(0.55, 0.85),
        period: rand(2800, 5000),
        phase: rand(0, Math.PI * 2),
        color: Math.random() < 0.15
          ? '255,200,180'
          : Math.random() < 0.15
            ? '180,200,255'
            : '240,238,228',
      })),
      medium: Array.from({ length: 35 }, () => ({
        x: rand(0, width),
        y: rand(0, heroMaxY() * 0.9),
        size: rand(0.9, 1.5),
        baseAlpha: rand(0.25, 0.5),
        period: rand(4000, 8000),
        phase: rand(0, Math.PI * 2),
        color: '235,233,225',
      })),
      dim: Array.from({ length: 60 }, () => ({
        x: rand(0, width),
        y: rand(0, heroMaxY() * 0.97),
        size: rand(0.6, 1.0),
        baseAlpha: rand(0.1, 0.22),
        period: rand(6000, 12000),
        phase: rand(0, Math.PI * 2),
        color: '220,220,215',
      })),
      shootingStars: [],
      lastShootingStarAt: 0,
    }
  }

  function initCanvasHintSeeds(hint) {
    const width = visualState.width
    const height = visualState.height
    const maxY = heroMaxY()
    if (!hint) {
      visualState.canvasHintSeeds = {}
      return
    }

    if (hint === 'petals') {
      visualState.canvasHintSeeds.petals = Array.from({ length: 12 }, () => ({
        x: rand(0, width),
        y: rand(-height * 0.2, maxY * 0.97),
        size: rand(3, 6),
        speed: rand(0.12, 0.22),
        sway: rand(6, 18),
        phase: rand(0, Math.PI * 2),
        rotation: rand(0, Math.PI * 2),
        rotationSpeed: rand(-0.01, 0.01),
      }))
    } else if (hint === 'autumn_leaves') {
      visualState.canvasHintSeeds.autumnLeaves = Array.from({ length: 10 }, () => ({
        x: rand(0, width),
        y: rand(-height * 0.1, maxY * 0.94),
        size: rand(4, 7),
        speed: rand(0.16, 0.28),
        sway: rand(8, 20),
        phase: rand(0, Math.PI * 2),
        rotation: rand(0, Math.PI * 2),
        rotationSpeed: rand(-0.012, 0.012),
      }))
    } else if (hint === 'grey_mist') {
      visualState.canvasHintSeeds.greyMist = Array.from({ length: 3 }, (_, index) => ({
        x: rand(-width * 0.2, width * 0.15),
        y: Math.min(maxY - height * 0.08, height * (0.22 + index * 0.18)),
        width: rand(width * 0.7, width * 0.95),
        height: rand(height * 0.06, height * 0.1),
        speed: rand(0.08, 0.16),
        alpha: rand(0.06, 0.1),
      }))
    } else if (hint === 'golden_dust') {
      visualState.canvasHintSeeds.goldenDust = Array.from({ length: 20 }, () => ({
        x: rand(0, width),
        y: rand(height * 0.3, maxY),
        size: rand(1, 2),
        speed: rand(0.08, 0.18),
        alpha: rand(0.1, 0.2),
        phase: rand(0, Math.PI * 2),
      }))
    } else if (hint === 'heat_shimmer') {
      visualState.canvasHintSeeds.heatBands = Array.from({ length: 3 }, (_, index) => ({
        y: Math.min(maxY - height * 0.08, height * (0.24 + index * 0.2)),
        height: rand(height * 0.08, height * 0.12),
        width: width * 1.2,
        phase: rand(0, Math.PI * 2),
        speed: rand(5000, 7000),
      }))
    } else if (hint === 'snow_soft') {
      visualState.canvasHintSeeds.snowSoft = Array.from({ length: 8 }, () => ({
        x: rand(0, width),
        y: rand(-height, maxY),
        size: rand(3, 5),
        speed: rand(0.4, 0.6),
        alpha: rand(0.12, 0.22),
        driftSeed: rand(0, Math.PI * 2),
      }))
    } else if (hint === 'fireworks') {
      visualState.canvasHintSeeds.fireworks = {
        bursts: [],
        nextBurstAt: 0,
      }
    } else if (hint === 'birthday_glow') {
      visualState.canvasHintSeeds.birthdayGlows = [
        { x: width * 0.24, y: Math.min(maxY * 0.4, height * 0.28), radius: width * 0.28, color: '#D4B878', speed: 12000, phase: 0.2 },
        { x: width * 0.72, y: Math.min(maxY * 0.48, height * 0.34), radius: width * 0.24, color: '#D79AA0', speed: 15000, phase: 1.5 },
        { x: width * 0.52, y: Math.min(maxY * 0.26, height * 0.18), radius: width * 0.22, color: '#8AAAD4', speed: 18000, phase: 2.6 },
      ]
    } else if (hint === 'warm_memory') {
      visualState.canvasHintSeeds.warmMemory = {
        x: width * 0.34,
        y: Math.min(maxY * 0.78, height * 0.56),
        radius: width * 0.44,
      }
    }
  }

  function setCanvasHint(hint) {
    const nextHint = hint || null
    if (visualState.canvasHintKey === nextHint) return
    visualState.canvasHintKey = nextHint
    visualState.hintActivatedAt = Date.now()
    initCanvasHintSeeds(nextHint)
  }

  function makeRainParticles(count, color) {
    return Array.from({ length: count }, () => ({
      x: rand(0, visualState.width),
      y: rand(-visualState.height, visualState.height),
      len: rand(10, 16),
      speed: rand(4, 7),
      alpha: rand(0.1, 0.2),
      color,
    }))
  }

  function makeSnowParticles(count) {
    return Array.from({ length: count }, () => ({
      x: rand(0, visualState.width),
      y: rand(-visualState.height, visualState.height),
      size: rand(1, 3),
      speed: rand(0.8, 1.5),
      alpha: rand(0.25, 0.5),
      driftSeed: Math.random() * Math.PI * 2,
    }))
  }

  function makeSparkParticles(count, mode) {
    return Array.from({ length: count }, () => ({
      x: rand(visualState.width * 0.2, visualState.width * 0.8),
      y: rand(visualState.height * 0.42, visualState.height * 0.60),
      size: mode === 'sunset' ? rand(0.8, 1.6) : rand(1.0, 2.0),
      speed: mode === 'day' ? rand(0.14, 0.20) : rand(0.18, 0.26),
      alpha: mode === 'sunset' ? rand(0.10, 0.18) : rand(0.08, 0.14),
    }))
  }

  function makeSandParticles(count) {
    return Array.from({ length: count }, () => ({
      x: rand(-visualState.width, visualState.width),
      y: rand(0, visualState.height),
      len: rand(2, 4),
      speed: rand(8, 12),
      alpha: rand(0.1, 0.2),
    }))
  }

  function getWeatherSignature(weather) {
    if (!weather) return 'none'
    return [
      weather.main || '',
      weather.description || '',
      weather.cloudiness ?? '',
    ].join('|')
  }

  function createWeatherProfile(weather, astronomy) {
    const main = weather?.main || 'Clear'
    const description = weather?.description || ''
    const cloudiness = typeof weather?.cloudiness === 'number' ? weather.cloudiness : null
    const themeKey = state.themeKey
    const solarAltitude = astronomy?.solar?.altitude ?? null
    const isDaylight = solarAltitude !== null ? solarAltitude > -6 : themeKey !== 'night'
    const profile = {
      main,
      description,
      cloudiness,
      hazeFilter: '',
      particles: [],
      snow: [],
      fog: null,
      overlayColor: null,
      kind: 'none',
      count: 0,
    }

    if (main === 'Clear') {
      profile.kind = 'clear'
      if (themeKey === 'sunset') {
        profile.particles = makeSparkParticles(3, 'sunset')
        profile.count = profile.particles.length
      } else if (isDaylight) {
        profile.particles = makeSparkParticles(themeKey === 'sunrise' ? 3 : 4, 'day')
        profile.count = profile.particles.length
      }
      return profile
    }

    if (main === 'Clouds') {
      profile.kind = 'clouds'
      if ((cloudiness ?? 100) < 50 && isDaylight) {
        profile.particles = makeSparkParticles(3, themeKey === 'sunset' ? 'sunset' : 'day')
      }
      profile.count = profile.particles.length
      return profile
    }

    if (main === 'Rain' || main === 'Drizzle' || main === 'Thunderstorm') {
      const isHeavy = /大雨|暴雨|heavy|storm/i.test(description)
      const isMid = /中雨|moderate/i.test(description)
      const count = main === 'Thunderstorm' ? 120 : isHeavy ? 120 : isMid ? 80 : 40
      const color = themeKey === 'night' ? '#6A8AA0' : themeKey === 'sunrise' ? '#A09080' : '#8AAABB'
      profile.kind = main === 'Thunderstorm' ? 'storm' : 'rain'
      profile.particles = makeRainParticles(count, color)
      profile.count = profile.particles.length
      return profile
    }

    if (main === 'Snow') {
      profile.kind = 'snow'
      profile.snow = makeSnowParticles(60)
      profile.count = profile.snow.length
      return profile
    }

    if (main === 'Mist' || main === 'Fog') {
      profile.kind = 'fog'
      profile.fog = { color: (themeKey === 'night' || themeKey === 'sunset') ? '#1A1A1A' : '#D0D0D0' }
      return profile
    }

    if (main === 'Haze') {
      profile.kind = 'haze'
      profile.overlayColor = themeKey === 'night' ? 'rgba(42,32,16,0.12)' : 'rgba(200,176,144,0.12)'
      profile.hazeFilter = 'sepia(0.1) saturate(0.8)'
      return profile
    }

    if (main === 'Dust' || main === 'Sand') {
      profile.kind = 'dust'
      profile.overlayColor = 'rgba(138,90,32,0.15)'
      profile.particles = makeSandParticles(40)
      profile.count = profile.particles.length
      return profile
    }

    if (main === 'Sleet') {
      profile.kind = 'sleet'
      profile.particles = makeRainParticles(40, '#8AAABB')
      profile.snow = makeSnowParticles(30)
      profile.count = profile.particles.length + profile.snow.length
      return profile
    }

    return profile
  }

  function initCloudSystem(weather, astronomy) {
    const width = visualState.width
    const height = visualState.height
    const main = weather?.main || 'Clear'
    const cloudiness = weather?.cloudiness ?? 0
    const themeKey = state.themeKey
    let cloudColor
    let cloudCount
    let cloudAlphaRange
    let cloudHeightRange

    if (main === 'Rain' || main === 'Drizzle' || main === 'Thunderstorm') {
      cloudColor = themeKey === 'night' || themeKey === 'sunset'
        ? { r: 40, g: 40, b: 50 }
        : { r: 120, g: 118, b: 125 }
      cloudCount = 5
      cloudAlphaRange = [0.18, 0.28]
      cloudHeightRange = [0.05, 0.45]
    } else if (main === 'Clouds') {
      if (cloudiness > 70) {
        cloudColor = themeKey === 'night'
          ? { r: 30, g: 30, b: 45 }
          : themeKey === 'sunset'
            ? { r: 80, g: 55, b: 45 }
            : { r: 180, g: 178, b: 182 }
        cloudCount = 4
        cloudAlphaRange = [0.12, 0.2]
        cloudHeightRange = [0.04, 0.5]
      } else {
        cloudColor = themeKey === 'night'
          ? { r: 35, g: 38, b: 55 }
          : themeKey === 'sunset'
            ? { r: 200, g: 120, b: 70 }
            : themeKey === 'sunrise'
              ? { r: 220, g: 160, b: 120 }
              : { r: 240, g: 238, b: 242 }
        cloudCount = 2
        cloudAlphaRange = [0.08, 0.14]
        cloudHeightRange = [0.08, 0.38]
      }
    } else {
      cloudCount = 0
      cloudColor = { r: 255, g: 255, b: 255 }
      cloudAlphaRange = [0, 0]
      cloudHeightRange = [0, 0]
    }

    visualState.cloudSystem = Array.from({ length: cloudCount }, () => ({
      x: rand(-width * 0.15, width * 1.05),
      y: height * rand(cloudHeightRange[0], cloudHeightRange[1]),
      w: rand(width * 0.28, width * 0.52),
      h: rand(height * 0.06, height * 0.12),
      speed: rand(0.08, 0.18) * (main === 'Thunderstorm' ? 2.2 : 1),
      alpha: rand(cloudAlphaRange[0], cloudAlphaRange[1]),
      color: cloudColor,
      blobSeeds: Array.from({ length: 5 }, () => ({
        offsetX: rand(-0.3, 0.3),
        offsetY: rand(-0.15, 0.15),
        rx: rand(0.22, 0.35),
        ry: rand(0.55, 0.85),
      })),
      seed: rand(0, Math.PI * 2),
    }))
  }

  function startWeatherSystem(weather, astronomy, immediate = false) {
    const signature = getWeatherSignature(weather)
    if (!immediate && signature === visualState.weatherSignature) return
    visualState.previousWeatherProfile = immediate ? null : visualState.currentWeatherProfile
    visualState.currentWeatherProfile = createWeatherProfile(weather, astronomy)
    initCloudSystem(weather, astronomy)
    visualState.weatherTransitionStart = performance.now()
    visualState.weatherSignature = signature
    canvas.style.filter = visualState.currentWeatherProfile?.hazeFilter || 'none'
  }

  function drawRadialGlow(x, y, radius, color, alpha) {
    const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius)
    const c = cachedParseColor(color)
    gradient.addColorStop(0, `rgba(${c.r}, ${c.g}, ${c.b}, ${alpha.toFixed(4)})`)
    gradient.addColorStop(1, `rgba(${c.r}, ${c.g}, ${c.b}, 0)`)
    ctx.fillStyle = gradient
    ctx.fillRect(0, 0, visualState.width, visualState.height)
  }

  function drawPhaseBase(nowMs, phaseKey, alphaScale = 1) {
    const width = visualState.width
    const height = visualState.height
    const maxY = heroMaxY()
    const phaseProgress = getPhaseProgress(phaseKey, nowMs, state.sunriseTs, state.sunsetTs)

    if (phaseKey === 'sunrise') {
      drawRadialGlow(width * 0.5, 0, width * 0.7, '#3A5A8A', (0.18 + Math.sin(nowMs / 14000 * Math.PI * 2) * 0.05) * alphaScale)
      drawRadialGlow(width * 0.5, height, width * (0.4 + 0.25 * phaseProgress), '#C87840', (0.14 + phaseProgress * 0.12) * alphaScale)
      return
    }

    if (phaseKey === 'morning') {
      // Light shadow bands drifting diagonally — like sunlight through windows
      // Three bands at different angles and speeds
      const bands = visualState.phaseSeeds.morningGlows
      bands.forEach((spot) => {
        spot.x += spot.vx
        spot.y += spot.vy
        spot.y = Math.min(spot.y, visualState.heroClipHeight * 0.88)
        if (spot.x < -spot.radius || spot.x > width + spot.radius) spot.vx *= -1
        if (spot.y < -spot.radius || spot.y > maxY) {
          spot.y = rand(height * 0.05, height * 0.62)
        }
        // Light band: diagonal, soft, warm
        const angle = Math.PI * 0.22  // ~40 degrees
        const bx = spot.x + Math.cos(angle) * spot.radius * 1.2
        const by = spot.y + Math.sin(angle) * spot.radius * 1.2
        const grad = ctx.createLinearGradient(
          spot.x - Math.cos(angle) * spot.radius,
          spot.y - Math.sin(angle) * spot.radius,
          bx, by
        )
        const alpha = spot.alpha * alphaScale
        grad.addColorStop(0, `hsla(${spot.hue}, 50%, 94%, 0)`)
        grad.addColorStop(0.35, `hsla(${spot.hue}, 55%, 92%, ${alpha.toFixed(4)})`)
        grad.addColorStop(0.65, `hsla(${spot.hue}, 55%, 92%, ${alpha.toFixed(4)})`)
        grad.addColorStop(1, `hsla(${spot.hue}, 50%, 94%, 0)`)
        ctx.fillStyle = grad
        ctx.fillRect(0, 0, width, height)
      })
      // Fixed warm sun accent top-right, intensity tied to time of morning
      const morningProgress = getPhaseProgress('morning', nowMs, state.sunriseTs, state.sunsetTs)
      const sunIntensity = 0.07 + morningProgress * 0.06
      const sunGrad = ctx.createRadialGradient(width * 0.88, 0, 0, width * 0.88, 0, width * 0.7)
      sunGrad.addColorStop(0, `rgba(255, 220, 160, ${(sunIntensity * alphaScale).toFixed(4)})`)
      sunGrad.addColorStop(1, 'rgba(255, 220, 160, 0)')
      ctx.fillStyle = sunGrad
      ctx.fillRect(0, 0, width, height)
      return
    }

    if (phaseKey === 'noon') {
      // Whole-canvas breathing rhythm — inhale/exhale of noon heat
      // Slow 14-second cycle
      const breathe = 0.5 + 0.5 * Math.sin(nowMs / 14000 * Math.PI * 2)
      // Top zenith: pulses brighter on inhale
      const zenithAlpha = (0.12 + breathe * 0.10) * alphaScale
      drawRadialGlow(width * 0.5, -height * 0.08, width * 0.68, '#FFFFFF', zenithAlpha)
      // Bottom warm reflection: counter-phase (darker when top is bright)
      const floorAlpha = (0.06 + (1 - breathe) * 0.06) * alphaScale
      drawRadialGlow(width * 0.5, height * 1.05, width * 0.5, '#E8D0A0', floorAlpha)
      // Light rays: each ray has its own slow pulse, independent phase
      visualState.phaseSeeds.noonRays.forEach((ray) => {
        const pulse = 0.5 + 0.5 * Math.sin(nowMs / ray.speed * Math.PI * 2 + ray.phase)
        const alpha = (ray.baseAlpha * 1.8 * pulse) * alphaScale
        const rayBottom = Math.min(maxY, height * 0.58)
        const grad = ctx.createLinearGradient(ray.x, 0, ray.x, rayBottom)
        grad.addColorStop(0, `rgba(255, 252, 240, ${alpha.toFixed(4)})`)
        grad.addColorStop(0.45, `rgba(255, 248, 225, ${(alpha * 0.5).toFixed(4)})`)
        grad.addColorStop(1, 'rgba(255, 248, 225, 0)')
        ctx.fillStyle = grad
        const rayWidth = width * 0.16
        ctx.fillRect(ray.x - rayWidth / 2, 0, rayWidth, rayBottom)
      })
      return
    }

    if (phaseKey === 'sunset') {
      const sunsetStart = state.sunsetTs ? state.sunsetTs * 1000 : nowMs
      const postSunsetProgress = nowMs > sunsetStart
        ? clamp((nowMs - sunsetStart) / (40 * 60000), 0, 1)
        : 0
      const centerX = width * (0.92 - 0.3 * phaseProgress)
      const centerY = height * 0.84
      const color = mixColor('#D4845A', '#8A3A1A', postSunsetProgress)
      const alpha = (0.32 + Math.sin(nowMs / 10000 * Math.PI * 2) * 0.06) * (1 - postSunsetProgress * 0.5) * alphaScale
      drawRadialGlow(centerX, centerY, width * 0.9, color, alpha)
      drawRadialGlow(width * 0.3, height * 0.1, width * 0.7, '#4A2060', 0.14 * (1 - postSunsetProgress * 0.4) * alphaScale)
      return
    }

    if (phaseKey === 'night') {
      visualState.phaseSeeds.nightGlows.forEach((glow) => {
        glow.x += glow.vx
        glow.y += glow.vy
        glow.y = Math.min(glow.y, visualState.heroClipHeight * 0.88)
        if (glow.x < -glow.radius || glow.x > width + glow.radius) glow.vx *= -1
        if (glow.y < -glow.radius || glow.y > maxY) {
          glow.y = rand(height * 0.05, height * 0.60)
        }
        const c = cachedParseColor(glow.color)
        const grad = ctx.createRadialGradient(glow.x, glow.y, 0, glow.x, glow.y, glow.radius)
        const alpha = glow.alpha * alphaScale
        grad.addColorStop(0, `rgba(${c.r}, ${c.g}, ${c.b}, ${alpha.toFixed(4)})`)
        grad.addColorStop(0.6, `rgba(${c.r}, ${c.g}, ${c.b}, ${(alpha * 0.3).toFixed(4)})`)
        grad.addColorStop(1, `rgba(${c.r}, ${c.g}, ${c.b}, 0)`)
        ctx.fillStyle = grad
        ctx.fillRect(0, 0, width, height)
      })
      const bandBottom = Math.min(maxY, height * 0.78)
      const bandGrad = ctx.createLinearGradient(0, height * 0.55, 0, bandBottom)
      bandGrad.addColorStop(0, 'rgba(40, 28, 12, 0)')
      bandGrad.addColorStop(0.5, `rgba(40, 28, 12, ${(0.1 * alphaScale).toFixed(4)})`)
      bandGrad.addColorStop(1, 'rgba(40, 28, 12, 0)')
      ctx.fillStyle = bandGrad
      ctx.fillRect(0, height * 0.55, width, Math.max(0, bandBottom - height * 0.55))
    }
  }

  function drawStarField(nowMs, astronomy, alphaScale) {
    if (!astronomy) return
    const visibility = astronomy.stars?.visibility ?? 0
    if (visibility <= 0.02) return

    const moonSuppression = astronomy.lunar?.isVisible
      ? (astronomy.lunar.illumination || 0) * 0.6
      : 0
    const effectiveVisibility = Math.max(0, visibility - moonSuppression)
    if (effectiveVisibility <= 0.02) return

    const sf = visualState.starField
    if (!sf) return

    const width = visualState.width
    const height = visualState.height
    const maxY = heroMaxY()

    withHeroClip(() => {
      const drawLayer = (stars, layerAlphaMultiplier) => {
        stars.forEach((star) => {
          if (star.y < 0 || star.y > maxY) star.y = rand(0, maxY * 0.98)
          const twinkle = 0.7 + 0.3 * Math.sin(nowMs / star.period * Math.PI * 2 + star.phase)
          const alpha = star.baseAlpha * twinkle * effectiveVisibility * layerAlphaMultiplier * alphaScale
          if (alpha < 0.01) return

        if (star.size > 1.6 && alpha > 0.3) {
          ctx.strokeStyle = `rgba(${star.color},${(alpha * 0.3).toFixed(4)})`
          ctx.lineWidth = 0.5
          ctx.beginPath()
          ctx.moveTo(star.x - star.size * 2.5, star.y)
          ctx.lineTo(star.x + star.size * 2.5, star.y)
          ctx.moveTo(star.x, star.y - star.size * 2.5)
          ctx.lineTo(star.x, star.y + star.size * 2.5)
          ctx.stroke()
        }

        ctx.beginPath()
        ctx.fillStyle = `rgba(${star.color},${alpha.toFixed(4)})`
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2)
        ctx.fill()
        })
      }

      drawLayer(sf.dim, 1)
      drawLayer(sf.medium, 1)
      drawLayer(sf.bright, 1)
    })

    const minutesSinceLast = (nowMs - sf.lastShootingStarAt) / 60000
    const shootingStarProbability = effectiveVisibility > 0.5
      ? 0.00004 * effectiveVisibility
      : 0

    if (minutesSinceLast > 1 && Math.random() < shootingStarProbability) {
      sf.shootingStars.push({
        x: rand(width * 0.1, width * 0.9),
        y: rand(height * 0.02, Math.min(maxY * 0.5, height * 0.35)),
        vx: rand(2.5, 5) * (Math.random() < 0.5 ? 1 : -1),
        vy: rand(1.5, 3),
        length: rand(width * 0.08, width * 0.18),
        alpha: 0.8,
        born: nowMs,
      })
      sf.lastShootingStarAt = nowMs
    }

    sf.shootingStars = sf.shootingStars.filter((ss) => {
      const age = nowMs - ss.born
      const lifetime = 900
      if (age > lifetime) return false

      const progress = age / lifetime
      const alpha = ss.alpha * (1 - progress) * effectiveVisibility * alphaScale
      const tailX = ss.x - ss.vx * (ss.length / 5)
      const tailY = ss.y - ss.vy * (ss.length / 5)
      const grad = ctx.createLinearGradient(tailX, tailY, ss.x, ss.y)
      grad.addColorStop(0, 'rgba(255,255,255,0)')
      grad.addColorStop(1, `rgba(255,255,255,${alpha.toFixed(4)})`)
      withHeroClip(() => {
        ctx.strokeStyle = grad
        ctx.lineWidth = 1.2
        ctx.beginPath()
        ctx.moveTo(tailX, tailY)
        ctx.lineTo(ss.x, ss.y)
        ctx.stroke()
      })

      ss.x += ss.vx
      ss.y += ss.vy
      if (ss.y < 0 || ss.y > maxY) {
        ss.y = rand(height * 0.02, Math.min(maxY * 0.5, height * 0.35))
      }
      return true
    })
  }

  function drawCloudSystem(nowMs, alphaScale) {
    const clouds = visualState.cloudSystem
    if (!clouds || !clouds.length) return

    const width = visualState.width
    const height = visualState.height

    clouds.forEach((cloud) => {
      cloud.x += cloud.speed
      if (cloud.x - cloud.w * 0.5 > width * 1.1) {
        cloud.x = -cloud.w * 0.6
        cloud.y = height * rand(0.04, 0.48)
      }

      const { r, g, b } = cloud.color
      const alpha = cloud.alpha * alphaScale
      cloud.blobSeeds.forEach((blob) => {
        const bx = cloud.x + blob.offsetX * cloud.w
        const by = cloud.y + blob.offsetY * cloud.h + Math.sin(nowMs / 9000 + cloud.seed) * 2
        const grad = ctx.createRadialGradient(bx, by, 0, bx, by, blob.rx * cloud.w)
        grad.addColorStop(0, `rgba(${r},${g},${b},${alpha.toFixed(4)})`)
        grad.addColorStop(0.6, `rgba(${r},${g},${b},${(alpha * 0.6).toFixed(4)})`)
        grad.addColorStop(1, `rgba(${r},${g},${b},0)`)

        ctx.save()
        ctx.translate(bx, by)
        ctx.scale(1, blob.ry / blob.rx)
        ctx.beginPath()
        ctx.arc(0, 0, blob.rx * cloud.w, 0, Math.PI * 2)
        ctx.fillStyle = grad
        ctx.fill()
        ctx.restore()
      })
    })
  }

  function drawSun(nowMs, astronomy, alphaScale) {
    if (!astronomy) return
    const { altitude, azimuth } = astronomy.solar
    if (altitude < -0.833) return

    const width = visualState.width
    const height = visualState.height
    const x = width * clamp((azimuth - 60) / 240, 0, 1)
    const sunAltitudeRatio = clamp(altitude / 90, 0, 1)
    const y = height * (0.68 - 0.58 * sunAltitudeRatio)
    const horizonProximity = 1 - Math.min(1, altitude / 20)
    const baseAlpha = (0.18 + horizonProximity * 0.14) * alphaScale
    const sunColor = {
      r: 255,
      g: Math.round(140 + (1 - horizonProximity) * 100),
      b: Math.round(60 + (1 - horizonProximity) * 140),
    }

    const outerRadius = width * (0.55 - sunAltitudeRatio * 0.2)
    const outerGrad = ctx.createRadialGradient(x, y, 0, x, y, outerRadius)
    outerGrad.addColorStop(0, `rgba(${sunColor.r},${sunColor.g},${sunColor.b},${(baseAlpha * 0.35).toFixed(4)})`)
    outerGrad.addColorStop(1, `rgba(${sunColor.r},${sunColor.g},${sunColor.b},0)`)
    ctx.fillStyle = outerGrad
    ctx.fillRect(0, 0, width, height)

    const midRadius = width * (0.25 - sunAltitudeRatio * 0.08)
    const midGrad = ctx.createRadialGradient(x, y, 0, x, y, midRadius)
    midGrad.addColorStop(0, `rgba(${sunColor.r},${sunColor.g},${sunColor.b},${(baseAlpha * 0.65).toFixed(4)})`)
    midGrad.addColorStop(1, `rgba(${sunColor.r},${sunColor.g},${sunColor.b},0)`)
    ctx.fillStyle = midGrad
    ctx.fillRect(0, 0, width, height)

    const innerRadius = width * 0.06
    const innerGrad = ctx.createRadialGradient(x, y, 0, x, y, innerRadius)
    innerGrad.addColorStop(0, `rgba(255,255,${Math.round(200 + (1 - horizonProximity) * 55)},${(baseAlpha * 1.2).toFixed(4)})`)
    innerGrad.addColorStop(1, 'rgba(255,255,200,0)')
    ctx.fillStyle = innerGrad
    ctx.fillRect(0, 0, width, height)

    if (altitude < 15) {
      const scatterGrad = ctx.createLinearGradient(0, y - height * 0.08, 0, y + height * 0.08)
      scatterGrad.addColorStop(0, 'rgba(255,160,60,0)')
      scatterGrad.addColorStop(0.5, `rgba(255,160,60,${(baseAlpha * 0.18).toFixed(4)})`)
      scatterGrad.addColorStop(1, 'rgba(255,160,60,0)')
      ctx.fillStyle = scatterGrad
      ctx.fillRect(0, y - height * 0.08, width, height * 0.16)
    }
  }

  function drawMoon(nowMs, astronomy, alphaScale) {
    if (!astronomy) return

    const phaseKey = state.themeKey
    const lunar = astronomy.lunar || {}
    const effectivePhase = forcedThemeKey ? phaseKey : (astronomy.solar?.phase || phaseKey)
    // Only show moon at night, or sunset if altitude is high
    const shouldDrawMoon = effectivePhase === 'night'
      ? Boolean(lunar.isVisible && (lunar.altitude || 0) > 0)
      : effectivePhase === 'sunset'
        ? (lunar.altitude || 0) > 25
        : false
    if (!shouldDrawMoon) return

    const phase = lunar.phase ?? 0
    const illumination = lunar.illumination ?? 0.5
    const altitude = lunar.altitude ?? 35
    const width = visualState.width
    const height = visualState.height

    // Position: upper area, waxing leans right, waning leans left
    const isWaxing = phase < 0.5
    const moonX = width * (isWaxing ? 0.70 : 0.30)
    const moonY = height * (0.52 - 0.38 * clamp(altitude / 80, 0, 1))
    const moonRadius = width * 0.028

    // Glow — soft, large, very low alpha
    const glowRadius = moonRadius * 4.5
    const glowAlpha = illumination * 0.08 * alphaScale
    const glowGrad = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, glowRadius)
    glowGrad.addColorStop(0, `rgba(220,220,200,${glowAlpha.toFixed(4)})`)
    glowGrad.addColorStop(0.4, `rgba(220,220,200,${(glowAlpha * 0.4).toFixed(4)})`)
    glowGrad.addColorStop(1, 'rgba(220,220,200,0)')
    ctx.fillStyle = glowGrad
    ctx.fillRect(0, 0, width, height)

    // Draw moon using pixel-level phase rendering via ImageData
    // This avoids all arc/ellipse boundary artifacts
    ctx.save()
    ctx.beginPath()
    ctx.arc(moonX, moonY, moonRadius + 1, 0, Math.PI * 2)
    ctx.clip()

    // Phase angle: 0=new, π=full, 2π=new again
    // Convert phase (0-1) to angle
    const phaseAngle = phase * Math.PI * 2

    // Draw dark side first — very transparent, suggestion only
    ctx.beginPath()
    ctx.arc(moonX, moonY, moonRadius, 0, Math.PI * 2)
    ctx.fillStyle = `rgba(18,18,28,${(0.28 * alphaScale).toFixed(4)})`
    ctx.fill()

    // Draw lit side using bezier curve terminator
    ctx.beginPath()
    const litColor = `rgba(228,222,200,${(0.32 * alphaScale).toFixed(4)})`

    if (phase <= 0.5) {
      // Waxing: lit on right
      // terminator x-offset: cos(phaseAngle) * moonRadius
      // at phase=0: cos(0)=1 → terminator at right edge (new moon, dark)
      // at phase=0.25: cos(π/2)=0 → terminator at center (quarter)
      // at phase=0.5: cos(π)=-1 → terminator at left edge (full)
      const tx = Math.cos(phaseAngle) * moonRadius
      ctx.moveTo(moonX, moonY - moonRadius)
      // Right arc (always lit for waxing)
      ctx.arc(moonX, moonY, moonRadius, -Math.PI / 2, Math.PI / 2, false)
      // Terminator curve: bezier approximating ellipse
      ctx.bezierCurveTo(
        moonX + tx + (tx > 0 ? tx * 0.55 : tx * 0.55), moonY + moonRadius * 0.55,
        moonX + tx + (tx > 0 ? tx * 0.55 : tx * 0.55), moonY - moonRadius * 0.55,
        moonX, moonY - moonRadius
      )
      ctx.fillStyle = litColor
      ctx.fill()
    } else {
      // Waning: lit on left
      const tx = Math.cos(phaseAngle) * moonRadius // will be positive (cos(π to 2π))
      ctx.moveTo(moonX, moonY - moonRadius)
      ctx.arc(moonX, moonY, moonRadius, -Math.PI / 2, Math.PI / 2, true)
      ctx.bezierCurveTo(
        moonX + tx - (tx > 0 ? tx * 0.55 : tx * 0.55), moonY + moonRadius * 0.55,
        moonX + tx - (tx > 0 ? tx * 0.55 : tx * 0.55), moonY - moonRadius * 0.55,
        moonX, moonY - moonRadius
      )
      ctx.fillStyle = litColor
      ctx.fill()
    }

    // Subtle surface texture — only on illuminated portion, very faint
    if (illumination > 0.25) {
      const mareAlpha = illumination * 0.07 * alphaScale
      // Mare Tranquillitatis-ish — offset based on waxing/waning
      const mx = isWaxing ? moonX + moonRadius * 0.18 : moonX - moonRadius * 0.18
      ctx.beginPath()
      ctx.arc(mx, moonY - moonRadius * 0.1, moonRadius * 0.22, 0, Math.PI * 2)
      ctx.fillStyle = `rgba(140,135,120,${(mareAlpha * 0.4).toFixed(4)})`
      ctx.fill()

      ctx.beginPath()
      ctx.arc(mx - moonRadius * 0.25, moonY + moonRadius * 0.2, moonRadius * 0.16, 0, Math.PI * 2)
      ctx.fillStyle = `rgba(140,135,120,${(mareAlpha * 0.4).toFixed(4)})`
      ctx.fill()
    }

    ctx.restore()
  }

  function drawWeatherOverlay(profile, nowMs, alphaScale = 1) {
    if (!profile || alphaScale <= 0) return
    const width = visualState.width
    const height = visualState.height
    ctx.save()
    ctx.globalAlpha = alphaScale

    if (profile.overlayColor) {
      ctx.fillStyle = profile.overlayColor
      ctx.fillRect(0, 0, width, height)
    }

    if (profile.particles.length) {
      if (profile.kind === 'rain' || profile.kind === 'storm') {
        ctx.lineWidth = 1
        profile.particles.forEach((drop) => {
          ctx.strokeStyle = drop.color
          ctx.globalAlpha = drop.alpha * alphaScale
          ctx.beginPath()
          ctx.moveTo(drop.x, drop.y)
          ctx.lineTo(drop.x + 1, drop.y + drop.len)
          ctx.stroke()
          drop.y += drop.speed
          drop.x += 0.35
          if (drop.y > height) {
            drop.y = -drop.len
            drop.x = rand(0, width)
          }
        })
        if (profile.kind === 'storm' && nowMs > visualState.flashUntil && Math.random() < 0.001) {
          visualState.flashUntil = nowMs + 100
        }
      } else if (profile.kind === 'dust') {
        profile.particles.forEach((grain) => {
          ctx.fillStyle = `rgba(192, 144, 80, ${grain.alpha.toFixed(4)})`
          ctx.fillRect(grain.x, grain.y, grain.len, 1)
          grain.x += grain.speed
          if (grain.x > width + 8) {
            grain.x = -8
            grain.y = rand(0, height)
          }
        })
      } else {
        profile.particles.forEach((spark) => {
          ctx.beginPath()
          ctx.fillStyle = profile.kind === 'clear' && state.themeKey === 'sunset'
            ? `rgba(255, 208, 128, ${(spark.alpha * alphaScale).toFixed(4)})`
            : `rgba(240, 192, 128, ${(spark.alpha * alphaScale).toFixed(4)})`
          ctx.arc(spark.x, spark.y, spark.size, 0, Math.PI * 2)
          ctx.fill()
          spark.y -= spark.speed
          if (state.themeKey === 'sunset') {
            spark.x += Math.sin(nowMs / 5000 + spark.y) * 0.08
          }
          if (spark.y < height * 0.4) {
            spark.y = rand(height * 0.45, height * 0.62)
            spark.x = rand(width * 0.2, width * 0.82)
          }
        })
      }
    }

    if (profile.snow.length) {
      profile.snow.forEach((flake, index) => {
        ctx.beginPath()
        ctx.fillStyle = `rgba(240,240,240,${(flake.alpha * alphaScale).toFixed(4)})`
        ctx.arc(flake.x, flake.y, flake.size, 0, Math.PI * 2)
        ctx.fill()
        flake.y += flake.speed
        flake.x += Math.sin(nowMs / 1000 + flake.driftSeed + index) * 0.08
        if (flake.y > height + 4) {
          flake.y = -4
          flake.x = rand(0, width)
        }
      })
    }

    if (profile.kind === 'fog') {
      const fogAlpha = 0.1 + Math.sin(nowMs / 15000 * Math.PI * 2) * 0.04
      const corners = [
        [0, 0],
        [width, 0],
        [0, height],
        [width, height],
      ]
      corners.forEach(([x, y]) => {
        const gradient = ctx.createRadialGradient(x, y, 0, width * 0.5, height * 0.5, width * 0.75)
        const c = cachedParseColor(profile.fog.color)
        gradient.addColorStop(0, `rgba(${c.r}, ${c.g}, ${c.b}, ${(fogAlpha * alphaScale).toFixed(4)})`)
        gradient.addColorStop(1, `rgba(${c.r}, ${c.g}, ${c.b}, 0)`)
        ctx.fillStyle = gradient
        ctx.fillRect(0, 0, width, height)
      })
    }

    if (profile.kind === 'haze') {
      ctx.fillStyle = profile.overlayColor
      ctx.fillRect(0, 0, width, height)
    }

    if (visualState.flashUntil > nowMs) {
      ctx.fillStyle = 'rgba(255,255,255,0.08)'
      ctx.fillRect(0, 0, width, height)
    }

    ctx.restore()
  }

  function getCanvasHintThemeWeight(hint) {
    const isWarmHint = ['petals', 'fireworks', 'warm_glow', 'golden_dust', 'heat_shimmer', 'birthday_glow', 'snow_soft', 'autumn_leaves', 'warm_memory'].includes(hint)
    return ['night', 'sunset'].includes(state.themeKey)
      ? 1
      : ['morning', 'noon'].includes(state.themeKey)
        ? (isWarmHint ? 0.72 : 0.88)
        : 0.84
  }

  function drawPetalsOverlay(nowMs, alphaScale) {
    const petals = visualState.canvasHintSeeds.petals || []
    const maxY = heroMaxY()
    petals.forEach((petal) => {
      petal.y += petal.speed
      petal.rotation += petal.rotationSpeed
      petal.x += Math.sin(nowMs / 5000 + petal.phase) * 0.12
      if (petal.y < -12 || petal.y > maxY) {
        petal.y = rand(-10, maxY * 0.2)
        petal.x = rand(0, visualState.width)
      }
      ctx.save()
      ctx.translate(petal.x + Math.sin(nowMs / 2200 + petal.phase) * petal.sway, petal.y)
      ctx.rotate(petal.rotation)
      ctx.fillStyle = `rgba(255, 235, 240, ${Math.min(0.25, alphaScale * rand(0.15, 0.25)).toFixed(4)})`
      ctx.beginPath()
      ctx.ellipse(0, 0, petal.size, petal.size * 0.66, Math.PI / 4, 0, Math.PI * 2)
      ctx.fill()
      ctx.restore()
    })
  }

  function drawAutumnLeavesOverlay(nowMs, alphaScale) {
    const leaves = visualState.canvasHintSeeds.autumnLeaves || []
    const maxY = heroMaxY()
    leaves.forEach((leaf) => {
      leaf.y += leaf.speed
      leaf.rotation += leaf.rotationSpeed
      leaf.x += Math.sin(nowMs / 2600 + leaf.phase) * 0.16
      if (leaf.y < -12 || leaf.y > maxY) {
        leaf.y = rand(-10, maxY * 0.2)
        leaf.x = rand(0, visualState.width)
      }
      ctx.save()
      ctx.translate(leaf.x + Math.sin(nowMs / 2400 + leaf.phase) * leaf.sway, leaf.y)
      ctx.rotate(leaf.rotation)
      ctx.fillStyle = `rgba(218, 150, 84, ${Math.min(0.22, alphaScale * 0.18).toFixed(4)})`
      ctx.beginPath()
      ctx.ellipse(0, 0, leaf.size, leaf.size * 0.72, Math.PI / 7, 0, Math.PI * 2)
      ctx.fill()
      ctx.restore()
    })
  }

  function drawWarmGlowOverlay(nowMs, alphaScale) {
    const maxY = heroMaxY()
    const pulse = 0.5 + 0.5 * Math.sin(nowMs / 12000 * Math.PI * 2)
    const alpha = Math.min(0.14, (0.08 + pulse * 0.06) * alphaScale)
    const gradient = ctx.createRadialGradient(
      visualState.width * 0.5,
      maxY,
      0,
      visualState.width * 0.5,
      maxY,
      visualState.width * 0.58
    )
    gradient.addColorStop(0, `rgba(255, 208, 160, ${alpha.toFixed(4)})`)
    gradient.addColorStop(0.45, `rgba(212, 132, 90, ${(alpha * 0.7).toFixed(4)})`)
    gradient.addColorStop(1, 'rgba(212, 132, 90, 0)')
    ctx.fillStyle = gradient
    ctx.fillRect(0, 0, visualState.width, visualState.height)
  }

  function drawSoftLightOverlay(nowMs, alphaScale) {
    const pulse = 0.5 + 0.5 * Math.sin(nowMs / 20000 * Math.PI * 2)
    const alpha = Math.min(0.12, (0.04 + pulse * 0.04) * alphaScale)
    const gradient = ctx.createLinearGradient(0, 0, 0, visualState.height)
    gradient.addColorStop(0, `rgba(255, 248, 220, ${alpha.toFixed(4)})`)
    gradient.addColorStop(1, 'rgba(255, 248, 220, 0)')
    ctx.fillStyle = gradient
    ctx.fillRect(0, 0, visualState.width, visualState.height)
  }

  function drawGreyMistOverlay(nowMs, alphaScale) {
    const bands = visualState.canvasHintSeeds.greyMist || []
    const maxY = heroMaxY()
    bands.forEach((band) => {
      band.x -= band.speed
      if (band.x + band.width < -40) band.x = visualState.width * 0.2
      if (band.y < 0 || band.y > maxY) {
        band.y = rand(visualState.height * 0.18, maxY * 0.86)
      }
      const gradient = ctx.createLinearGradient(band.x, band.y, band.x + band.width, band.y)
      const alpha = Math.min(0.1, band.alpha * alphaScale)
      gradient.addColorStop(0, 'rgba(180,180,190,0)')
      gradient.addColorStop(0.5, `rgba(180,180,190,${alpha.toFixed(4)})`)
      gradient.addColorStop(1, 'rgba(180,180,190,0)')
      ctx.fillStyle = gradient
      ctx.fillRect(band.x, band.y, band.width, band.height)
    })
  }

  function drawGoldenDustOverlay(nowMs, alphaScale) {
    const dust = visualState.canvasHintSeeds.goldenDust || []
    const maxY = heroMaxY()
    dust.forEach((particle) => {
      particle.y -= particle.speed
      particle.x += Math.sin(nowMs / 3000 + particle.phase) * 0.12
      if (particle.y < -4 || particle.y > maxY) {
        particle.y = rand(maxY * 0.3, maxY)
        particle.x = rand(0, visualState.width)
      }
      ctx.fillStyle = `rgba(232, 200, 120, ${Math.min(0.2, particle.alpha * alphaScale).toFixed(4)})`
      ctx.fillRect(particle.x, particle.y, particle.size, particle.size)
    })
  }

  function drawMorningCrispOverlay(nowMs, alphaScale) {
    const maxY = heroMaxY()
    const pulse = 0.5 + 0.5 * Math.sin(nowMs / 10000 * Math.PI * 2)
    const alpha = Math.min(0.1, (0.04 + pulse * 0.04) * alphaScale)
    const gradient = ctx.createRadialGradient(
      visualState.width * 0.5,
      0,
      0,
      visualState.width * 0.5,
      0,
      Math.min(visualState.width * 0.55, maxY)
    )
    gradient.addColorStop(0, `rgba(160, 200, 224, ${alpha.toFixed(4)})`)
    gradient.addColorStop(1, 'rgba(160, 200, 224, 0)')
    ctx.fillStyle = gradient
    ctx.fillRect(0, 0, visualState.width, visualState.height)
  }

  function drawHeatShimmerOverlay(nowMs, alphaScale) {
    const bands = visualState.canvasHintSeeds.heatBands || []
    const maxY = heroMaxY()
    bands.forEach((band) => {
      const offsetY = Math.sin(nowMs / band.speed * Math.PI * 2 + band.phase) * 8
      let y = band.y + offsetY
      if (y < 0 || y > maxY) {
        band.y = rand(visualState.height * 0.2, maxY * 0.84)
        y = band.y
      }
      const gradient = ctx.createLinearGradient(0, y, 0, y + band.height)
      const alpha = Math.min(0.12, 0.04 * alphaScale)
      gradient.addColorStop(0, 'rgba(255,200,100,0)')
      gradient.addColorStop(0.5, `rgba(255,200,100,${alpha.toFixed(4)})`)
      gradient.addColorStop(1, 'rgba(255,200,100,0)')
      ctx.fillStyle = gradient
      ctx.fillRect(-visualState.width * 0.1, y, band.width, band.height)
    })
  }

  function drawBirthdayGlowOverlay(nowMs, alphaScale) {
    const glows = visualState.canvasHintSeeds.birthdayGlows || []
    const maxY = heroMaxY()
    glows.forEach((glow) => {
      if (glow.y < 0 || glow.y > maxY) {
        glow.y = rand(visualState.height * 0.18, maxY * 0.52)
      }
      const pulse = 0.5 + 0.5 * Math.sin(nowMs / glow.speed * Math.PI * 2 + glow.phase)
      drawRadialGlow(glow.x, glow.y, glow.radius, glow.color, Math.min(0.12, (0.03 + pulse * 0.09) * alphaScale))
    })
  }

  function drawWarmMemoryOverlay(nowMs, alphaScale) {
    const memory = visualState.canvasHintSeeds.warmMemory
    if (!memory) return
    const maxY = heroMaxY()
    if (memory.y < 0 || memory.y > maxY) {
      memory.y = rand(visualState.height * 0.28, maxY * 0.78)
    }
    const pulse = 0.5 + 0.5 * Math.sin(nowMs / 16000 * Math.PI * 2)
    drawRadialGlow(
      memory.x,
      memory.y,
      memory.radius,
      '#C8A064',
      Math.min(0.11, (0.06 + pulse * 0.05) * alphaScale)
    )
  }

  function drawSnowSoftOverlay(nowMs, alphaScale) {
    const flakes = visualState.canvasHintSeeds.snowSoft || []
    const maxY = heroMaxY()
    const glow = ctx.createRadialGradient(
      visualState.width * 0.1,
      maxY,
      0,
      visualState.width * 0.1,
      maxY,
      visualState.width * 0.3
    )
    glow.addColorStop(0, `rgba(255, 200, 120, ${Math.min(0.08, alphaScale * 0.08).toFixed(4)})`)
    glow.addColorStop(1, 'rgba(255, 200, 120, 0)')
    ctx.fillStyle = glow
    ctx.fillRect(0, 0, visualState.width, visualState.height)

    flakes.forEach((flake, index) => {
      flake.y += flake.speed
      flake.x += Math.sin(nowMs / 1400 + flake.driftSeed + index) * 0.08
      if (flake.y < -6 || flake.y > maxY) {
        flake.y = rand(-6, maxY * 0.2)
        flake.x = rand(0, visualState.width)
      }
      ctx.beginPath()
      ctx.fillStyle = `rgba(244, 244, 248, ${Math.min(0.22, flake.alpha * alphaScale).toFixed(4)})`
      ctx.arc(flake.x, flake.y, flake.size, 0, Math.PI * 2)
      ctx.fill()
    })
  }

  function isFireworksWindow(now) {
    const minutes = now.getHours() * 60 + now.getMinutes()
    return minutes >= 23 * 60 + 30 || minutes <= 30
  }

  function drawFireworksOverlay(nowMs, alphaScale) {
    const seed = visualState.canvasHintSeeds.fireworks
    if (!seed || !isFireworksWindow(new Date(nowMs))) return
    const maxY = heroMaxY()

    if (seed.nextBurstAt === 0) {
      seed.nextBurstAt = nowMs + rand(4000, 8000)
    }
    if (nowMs >= seed.nextBurstAt && seed.bursts.length < 3) {
      const colors = ['rgba(255,220,160,ALPHA)', 'rgba(255,245,240,ALPHA)', 'rgba(224,170,176,ALPHA)']
      seed.bursts.push({
        x: rand(visualState.width * 0.12, visualState.width * 0.88),
        y: rand(visualState.height * 0.08, Math.min(maxY * 0.48, visualState.height * 0.34)),
        startedAt: nowMs,
        lines: Array.from({ length: 16 }, (_, index) => ({
          angle: (Math.PI * 2 * index) / 16,
          length: rand(24, 46),
          color: colors[index % colors.length],
        })),
      })
      seed.nextBurstAt = nowMs + rand(4000, 8000)
    }

    seed.bursts = seed.bursts.filter((burst) => nowMs - burst.startedAt <= 1200)
    seed.bursts.forEach((burst) => {
      if (burst.y < 0 || burst.y > maxY) {
        burst.y = rand(visualState.height * 0.08, Math.min(maxY * 0.48, visualState.height * 0.34))
      }
      const progress = clamp((nowMs - burst.startedAt) / 1200, 0, 1)
      const lineAlpha = Math.min(0.2, (1 - progress) * alphaScale * 0.2)
      burst.lines.forEach((line) => {
        const distance = line.length * progress
        ctx.strokeStyle = line.color.replace('ALPHA', lineAlpha.toFixed(4))
        ctx.lineWidth = 1.1
        ctx.beginPath()
        ctx.moveTo(burst.x, burst.y)
        ctx.lineTo(
          burst.x + Math.cos(line.angle) * distance,
          burst.y + Math.sin(line.angle) * distance
        )
        ctx.stroke()
      })
    })
  }

  function drawCanvasHint(nowMs, hint, alphaScale) {
    if (!hint) return
    if (alphaScale <= 0) return
    withHeroClip(() => {
      if (hint === 'petals') drawPetalsOverlay(nowMs, alphaScale)
      else if (hint === 'autumn_leaves') drawAutumnLeavesOverlay(nowMs, alphaScale)
      else if (hint === 'warm_glow') drawWarmGlowOverlay(nowMs, alphaScale)
      else if (hint === 'soft_light') drawSoftLightOverlay(nowMs, alphaScale)
      else if (hint === 'grey_mist') drawGreyMistOverlay(nowMs, alphaScale)
      else if (hint === 'golden_dust') drawGoldenDustOverlay(nowMs, alphaScale)
      else if (hint === 'morning_crisp') drawMorningCrispOverlay(nowMs, alphaScale)
      else if (hint === 'heat_shimmer') drawHeatShimmerOverlay(nowMs, alphaScale)
      else if (hint === 'birthday_glow') drawBirthdayGlowOverlay(nowMs, alphaScale)
      else if (hint === 'warm_memory') drawWarmMemoryOverlay(nowMs, alphaScale)
      else if (hint === 'snow_soft') drawSnowSoftOverlay(nowMs, alphaScale)
      else if (hint === 'fireworks') drawFireworksOverlay(nowMs, alphaScale)
    })
  }

  async function refreshAmbientNow(force = false) {
    if (visualState.fetchingAmbient) return
    const nowMs = Date.now()
    if (!force && nowMs - visualState.lastWeatherFetchAt < 30 * 60000) return
    visualState.fetchingAmbient = true
    try {
      const response = await fetch('/api/now')
      const data = await response.json()
      if (data.weather) {
        state.weather = data.weather
        state.astronomy = data.astronomy || buildFallbackAstronomy()
        state.canvasHint = state.astronomy?.canvasHintActive || null
        setCanvasHint(state.canvasHint)
        state.sunrise = data.sunrise || data.weather.sunrise || null
        state.sunset = data.sunset || data.weather.sunset || null
        state.sunriseTs = data.sunrise_ts || data.weather.sunriseTs || null
        state.sunsetTs = data.sunset_ts || data.weather.sunsetTs || null
        startWeatherSystem(data.weather, state.astronomy)
        renderHero()
      }
      visualState.lastWeatherFetchAt = nowMs
    } catch {}
    finally {
      visualState.fetchingAmbient = false
    }
  }

  function startVisualLoop(timestamp) {
    if (!visualState.lastFrameAt) visualState.lastFrameAt = timestamp
    const profileCount = (visualState.currentWeatherProfile?.count || 0) + (visualState.previousWeatherProfile?.count || 0)
    const minFrameGap = profileCount > 200 ? 33 : 16
    if (timestamp - visualState.lastFrameAt < minFrameGap) {
      weatherFrameId = requestAnimationFrame(startVisualLoop)
      return
    }
    visualState.lastFrameAt = timestamp

    const nowMs = Date.now()
    const clockStamp = ts(new Date(nowMs))
    if (visualState.lastClockSecond !== clockStamp) {
      visualState.lastClockSecond = clockStamp
      state.now = new Date(nowMs)
      renderHero()
    }

    const themed = getInterpolatedThemeState(nowMs)
    state.themeKey = themed.themeKey
    inThemeTransition = themed.transitioning
    const themeKeyChanged = themed.themeKey !== lastAppliedThemeKey
    const forceKeyChanged = forcedThemeKey !== lastRenderedForceKey
    if (themeKeyChanged || inThemeTransition) {
      setTheme(themed.themeState, themed.themeKey)
    }
    if (themeKeyChanged || forceKeyChanged) {
      renderThemePreview()
      if (state.weather) initCloudSystem(state.weather, state.astronomy)
      lastRenderedForceKey = forcedThemeKey
    }
    if (!inThemeTransition) {
      lastAppliedThemeKey = themed.themeKey
    }

    ctx.clearRect(0, 0, visualState.width, visualState.height)
    const heroClipHeight = visualState.heroClipHeight
    ctx.save()
    ctx.beginPath()
    ctx.rect(0, 0, visualState.width, heroClipHeight)
    ctx.clip()

    drawPhaseBase(nowMs, state.themeKey, 1)
    drawStarField(nowMs, state.astronomy, 1)
    drawCloudSystem(nowMs, 1)
    if (state.astronomy) drawSun(nowMs, state.astronomy, 1)
    if (state.astronomy) drawMoon(nowMs, state.astronomy, 1)

    let currentAlpha = 1
    if (visualState.previousWeatherProfile) {
      const transitionProgress = clamp((timestamp - visualState.weatherTransitionStart) / 3000, 0, 1)
      drawWeatherOverlay(visualState.previousWeatherProfile, nowMs, 1 - transitionProgress)
      currentAlpha = transitionProgress
      if (transitionProgress >= 1) visualState.previousWeatherProfile = null
    }
    drawWeatherOverlay(visualState.currentWeatherProfile, nowMs, currentAlpha)
    if (state.canvasHint) {
      const fadeIn = Math.min(1, (nowMs - visualState.hintActivatedAt) / 3000)
      drawCanvasHint(nowMs, state.canvasHint, fadeIn * getCanvasHintThemeWeight(state.canvasHint))
    }

    ctx.restore()

    if (nowMs - visualState.lastWeatherFetchAt >= 30 * 60000) {
      refreshAmbientNow()
    }

    weatherFrameId = requestAnimationFrame(startVisualLoop)
  }

  document.getElementById('btn-prev').addEventListener('click', playPrevious)
  document.getElementById('btn-next').addEventListener('click', advanceToNext)
  document.getElementById('btn-note').addEventListener('click', explainCurrentTrack)
  document.getElementById('btn-dislike').addEventListener('click', () => sendFeedback('dislike'))
  document.getElementById('btn-heart').addEventListener('click', () => sendFeedback('like'))
  page1Footer.addEventListener('click', goToPage2)
  page2Back.addEventListener('click', goToPage1)

  // 触摸滑动支持
  let touchStartY = 0
  let touchStartX = 0

  pagesContainer.addEventListener('touchstart', (e) => {
    touchStartY = e.touches[0].clientY
    touchStartX = e.touches[0].clientX
  }, { passive: true })

  pagesContainer.addEventListener('touchend', (e) => {
    const dy = e.changedTouches[0].clientY - touchStartY
    const dx = e.changedTouches[0].clientX - touchStartX
    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 60) {
      if (dy < 0 && currentPage === 1) goToPage2()
      if (dy > 0 && currentPage === 2) goToPage1()
    }
  }, { passive: true })
  playButton.addEventListener('click', togglePlay)
  composerSend.addEventListener('click', send)
  composerInput.addEventListener('input', renderControls)
  composerInput.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault()
      send()
    }
  })
  startButton.addEventListener('click', startListening)
  progressLine.addEventListener('click', seekTo)
  queueList.addEventListener('click', (event) => {
    const button = event.target.closest('[data-queue-index]')
    if (!button) return
    pickQueue(Number(button.getAttribute('data-queue-index')))
  })
  messageList.addEventListener('click', (event) => {
    const replay = event.target.closest('[data-replay]')
    if (!replay) return
    playVoice(replay.getAttribute('data-replay'), replay.getAttribute('data-duck') === '1')
  })
  window.__claudioSetThemePreview = applyForcedTheme
  window.addEventListener('resize', resizeCanvas)

  audio.volume = state.volume
  audio.addEventListener('timeupdate', () => {
    state.progress = audio.currentTime || 0
    state.duration = audio.duration || 0
    renderProgress()
  })
  audio.addEventListener('play', () => {
    state.playing = true
    renderControls()
  })
  audio.addEventListener('pause', () => {
    state.playing = false
    renderControls()
  })
  audio.addEventListener('ended', () => {
    advanceToNext()
  })

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {})
  }

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      async (position) => {
        try {
          await fetch('/api/location', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              lat: position.coords.latitude,
              lon: position.coords.longitude,
            }),
          })
          await refreshAmbientNow(true)
        } catch {}
      },
      () => {},
      {
        enableHighAccuracy: false,
        timeout: 8000,
        maximumAge: 15 * 60 * 1000,
      }
    )
  }

  resizeCanvas()
  state.astronomy = buildFallbackAstronomy()
  const initialTheme = getInterpolatedThemeState(Date.now())
  state.themeKey = initialTheme.themeKey
  setTheme(initialTheme.themeState, initialTheme.themeKey)
  renderAll()
  startWeatherSystem(state.weather, state.astronomy)
  loadInitialState().catch((error) => showError(error && error.stack ? error.stack : error))
  connectWs()
  refreshAmbientNow(true).catch(() => {})
  weatherFrameId = requestAnimationFrame(startVisualLoop)
})()
</script>
</body>
</html>
