<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Claudio</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Claudio FM">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --accent: #C9A96E;
    --text-main: #F0EDE8;
    --text-sub: rgba(240, 237, 232, 0.52);
    --text-dim: rgba(240, 237, 232, 0.28);
    --line: rgba(240, 237, 232, 0.08);
    --surface: rgba(255, 255, 255, 0.025);
    --surface-2: rgba(255, 255, 255, 0.04);
    --bubble-dj: rgba(255, 255, 255, 0.04);
    --bubble-commentary: rgba(255, 255, 255, 0.03);
    --bubble-you: rgba(201, 169, 110, 0.08);
    --control: #5A5A5A;
    --control-hover: #C9A96E;
    --on-air: #7BB87A;
    --input-bg: rgba(255, 255, 255, 0.02);
  }

  * { box-sizing: border-box; }

  * {
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  }

  #app {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 430px;
    max-height: 100vh;
    overflow: hidden;
    background: var(--bg);
  }

  @media (min-width: 540px) {
    #app {
      max-height: 820px;
      border-radius: 28px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 22px 70px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.02);
    }
    body {
      padding: 16px;
    }
  }

  #weather-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .panel-layer {
    position: relative;
    z-index: 3;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    height: 28px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.38em;
    color: var(--text-dim);
  }

  .hero {
    position: relative;
    flex: 1;
    min-height: 0;
    padding: 20px 28px 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .hero-meta {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: start;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
  }

  .hero-time {
    color: var(--text-sub);
  }

  .hero-city {
    justify-self: center;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-sub);
    text-transform: uppercase;
  }

  .hero-onair {
    justify-self: end;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    color: var(--on-air);
  }

  .hero-onair-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--on-air);
    box-shadow: 0 0 10px rgba(123,184,122,0.6);
  }

  .theme-preview {
    position: absolute;
    top: 56px;
    right: 22px;
    z-index: 4;
    display: flex;
    justify-content: flex-end;
    flex-wrap: wrap;
    gap: 8px;
    max-width: 180px;
    pointer-events: auto;
  }

  .theme-chip {
    appearance: none;
    border: 1px solid var(--line);
    background: rgba(0, 0, 0, 0.28);
    color: var(--text-sub);
    padding: 6px 10px;
    min-width: 44px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: color 120ms ease, border-color 120ms ease, background-color 120ms ease;
  }

  .theme-chip:hover {
    color: var(--accent);
    border-color: rgba(201, 169, 110, 0.35);
  }

  .theme-chip.active {
    color: var(--accent);
    border-color: rgba(201, 169, 110, 0.45);
    background: rgba(201, 169, 110, 0.08);
  }

  .hero-center {
    position: relative;
    z-index: 2;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding-bottom: 16px;
  }

  .hero-title {
    margin: 0;
    max-width: 92%;
    font-family: "Cormorant Garamond", "Noto Serif SC", "Source Han Serif CN", serif;
    font-style: normal;
    font-weight: 400;
    line-height: 0.94;
    letter-spacing: 0.02em;
    color: var(--text-main);
    text-wrap: balance;
    -webkit-text-size-adjust: 100%;
    word-break: break-word;
    overflow-wrap: break-word;
  }

  .hero-title-rule {
    width: 32px;
    height: 1px;
    background: var(--accent);
    opacity: 0.3;
    margin: 10px auto 0;
  }

  .hero-artist {
    margin-top: 10px;
    font-size: 9.5px;
    font-weight: 300;
    font-variant: small-caps;
    letter-spacing: 0.28em;
    font-family: "Cormorant Garamond", "Noto Serif SC", serif;
    color: var(--text-dim);
  }

  .hero-commentary {
    margin-top: 20px;
    max-width: 72%;
    min-height: 34px;
    font-family: "Cormorant Garamond", "Noto Serif SC", serif;
    font-size: 13px;
    font-style: italic;
    font-weight: 400;
    line-height: 2;
    color: var(--text-sub);
    letter-spacing: 0.03em;
    border-left: 1.5px solid var(--accent);
    padding-left: 14px;
    text-align: left;
    margin-left: auto;
    margin-right: auto;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 320ms ease, transform 320ms ease;
  }

  .hero-commentary.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .progress-wrap {
    position: relative;
    z-index: 2;
    padding: 16px 28px;
    flex-shrink: 0;
  }

  .progress-line {
    position: relative;
    width: 100%;
    height: 1.5px;
    background: var(--line);
    cursor: pointer;
  }

  .progress-line-fill {
    position: absolute;
    inset: 0 auto 0 0;
    width: 0;
    height: inherit;
  }

  .progress-meta {
    margin-top: 12px;
    display: flex;
    justify-content: space-between;
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    color: var(--text-dim);
  }

  .controls {
    height: 64px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }

  .control-btn {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--control);
    width: 28px;
    height: 28px;
    padding: 0;
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: color 120ms ease, opacity 120ms ease, transform 120ms ease;
  }

  .control-btn:hover:not(:disabled) {
    color: var(--control-hover);
    transform: translateY(-1px);
  }

  .control-btn:disabled {
    cursor: default;
    opacity: 0.4;
  }

  /* 双页滑动容器 */
  .pages-container {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    transition: transform 400ms cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
    height: 200%;
  }

  .pages-container.show-page2 {
    transform: translateY(-50%);
  }

  .page {
    width: 100%;
    height: 50%;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* 页面切换指示器 */
  .page-indicator {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 10;
  }

  .page-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 200ms ease, transform 200ms ease;
  }

  .page-dot.active {
    background: var(--accent);
    transform: scale(1.3);
  }

  /* 次页顶部栏 */
  .page2-topbar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }

  .page2-topbar-title {
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.38em;
    color: var(--text-dim);
  }

  .page2-back-btn {
    appearance: none;
    -webkit-appearance: none;
    border: 0;
    background: transparent;
    color: var(--text-dim);
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    cursor: pointer;
    padding: 8px 0;
    display: flex;
    align-items: center;
    gap: 6px;
    -webkit-tap-highlight-color: transparent;
    transition: color 120ms ease;
  }

  .page2-back-btn:hover { color: var(--accent); }

  .page2-body {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 主页底部切换按钮 */
  .page1-footer {
    height: 40px;
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: background 120ms ease;
  }

  .page1-footer:hover {
    background: var(--surface);
  }

  .page1-footer-bar {
    width: 56px;
    height: 1.5px;
    background: var(--line);
    border-radius: 1px;
    transition: background 180ms ease;
    pointer-events: none;
  }

  .page1-footer:hover .page1-footer-bar {
    background: var(--accent);
  }

  .queue-panel {
    padding: 4px 28px 12px;
    border-bottom: 1px solid var(--line);
    max-height: 52%;
    overflow-y: auto;
  }

  .queue-head {
    display: flex;
    justify-content: space-between;
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  .queue-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .queue-item {
    width: 100%;
    border: 0;
    background: transparent;
    color: inherit;
    padding: 11px 0 11px 0;
    display: grid;
    grid-template-columns: 24px 1fr;
    gap: 10px;
    align-items: center;
    text-align: left;
    cursor: pointer;
    border-bottom: 1px solid var(--line);
    margin-bottom: 0;
  }

  .queue-item:last-child {
    border-bottom: none;
  }

  .queue-item-num {
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    color: var(--text-dim);
    padding-top: 2px;
    min-width: 20px;
  }

  .queue-item-num.queue-item-playing {
    color: var(--accent);
    font-size: 10px;
  }

  .queue-item-title {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    font-size: 13px;
    font-weight: 400;
    line-height: 1.3;
    letter-spacing: 0.01em;
    color: var(--text-main);
  }

  .queue-item-artist {
    margin-top: 2px;
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .queue-panel::-webkit-scrollbar {
    width: 2px;
  }

  .queue-panel::-webkit-scrollbar-thumb {
    background: var(--line);
    border-radius: 1px;
  }

  .chat-panel {
    min-height: 0;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .chat-scroll {
    min-height: 0;
    flex: 1;
    overflow-y: auto;
    padding: 18px 28px 12px;
  }

  .chat-live {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
  }

  .chat-live::before,
  .chat-live::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .msg {
    margin-bottom: 20px;
  }

  .msg.you {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  .msg-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
  }

  .msg-avatar {
    width: 22px;
    height: 22px;
    border: 1px solid var(--line);
    display: grid;
    place-items: center;
    font-size: 12px;
  }

  .msg-bubble {
    max-width: 88%;
    padding: 14px 16px;
    background: var(--bubble-dj);
    color: var(--text-main);
    font-size: 14px;
    line-height: 1.62;
  }

  .msg-commentary {
    background: var(--bubble-commentary);
    border-left: 2px solid var(--accent);
  }

  .msg.you .msg-bubble {
    background: var(--bubble-you);
  }

  .msg-time {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
  }

  .msg.you .msg-time {
    justify-content: flex-end;
  }

  .msg-replay {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--accent);
    padding: 0;
    font: inherit;
    letter-spacing: inherit;
    cursor: pointer;
  }

  .composer {
    padding: 14px 28px 18px;
    display: grid;
    grid-template-columns: 1fr 54px;
    gap: 12px;
    border-top: 1px solid var(--line);
  }

  .composer-input {
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    border: 1px solid var(--line);
    border-radius: 0;
    background: rgba(255,255,255,0.14);
    color: var(--text-main);
    min-height: 48px;
    padding: 0 16px;
    font-size: 15px;
    outline: none;
  }

  .composer-input::placeholder {
    color: var(--text-dim);
  }

  .composer-send {
    appearance: none;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.12);
    color: var(--text-main);
    cursor: pointer;
    transition: color 120ms ease, border-color 120ms ease, transform 120ms ease;
  }

  .composer-send:hover:not(:disabled) {
    color: var(--accent);
    border-color: rgba(201, 169, 110, 0.35);
    transform: translateY(-1px);
  }

  .composer-send:disabled {
    cursor: default;
    opacity: 0.4;
  }

  .overlay {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.62);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .overlay.visible {
    display: flex;
  }

  .overlay-button {
    appearance: none;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--text-sub);
    padding: 14px 40px;
    border-radius: 0;
    box-shadow: none;
    font-family: "Cormorant Garamond", serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 200ms ease, border-color 200ms ease;
  }

  .overlay-button:hover {
    color: var(--accent);
    border-color: rgba(201,169,110,0.45);
  }

  #app.dj-speaking .hero-title {
    opacity: 0.72;
    transition: opacity 600ms ease;
  }

  #app.dj-speaking .hero-artist {
    opacity: 0.5;
    transition: opacity 600ms ease;
  }

  #app.dj-speaking .progress-wrap {
    opacity: 0.6;
    transition: opacity 600ms ease;
  }

  #app.dj-speaking .hero-onair-dot {
    animation: dj-pulse 1.8s ease-in-out infinite;
  }

  @keyframes dj-pulse {
    0%, 100% { box-shadow: 0 0 6px rgba(123,184,122,0.5); transform: scale(1); }
    50% { box-shadow: 0 0 14px rgba(123,184,122,0.9); transform: scale(1.25); }
  }

  .error-overlay {
    position: fixed;
    left: 16px;
    right: 16px;
    bottom: 16px;
    z-index: 9999;
    display: none;
    padding: 12px 14px;
    background: rgba(40, 8, 8, 0.96);
    border: 1px solid rgba(255, 120, 120, 0.3);
    color: #ffd7d7;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    line-height: 1.55;
    white-space: pre-wrap;
  }

</style>
</head>
<body>
<div id="app">
  <canvas id="weather-canvas"></canvas>
  <audio id="claudio-audio" style="display:none"></audio>
  <div class="pages-container" id="pages-container">

    <!-- 第一页：主播放页 -->
    <div class="page" id="page1">
      <div class="panel-layer">
        <div class="topbar">CLAUDIO</div>

        <section class="hero">
          <div class="hero-meta">
            <div class="hero-time" id="hero-time">00:00</div>
            <div class="hero-city" id="hero-city"></div>
            <div class="hero-onair">
              <span class="hero-onair-dot"></span>
              ON AIR
            </div>
          </div>

          <div class="theme-preview" id="theme-preview">
            <button type="button" class="theme-chip" data-theme-preview="sunrise" onclick="window.__claudioSetThemePreview('sunrise')">日出</button>
            <button type="button" class="theme-chip" data-theme-preview="morning" onclick="window.__claudioSetThemePreview('morning')">上午</button>
            <button type="button" class="theme-chip" data-theme-preview="noon" onclick="window.__claudioSetThemePreview('noon')">正午</button>
            <button type="button" class="theme-chip" data-theme-preview="sunset" onclick="window.__claudioSetThemePreview('sunset')">落日</button>
            <button type="button" class="theme-chip" data-theme-preview="night" onclick="window.__claudioSetThemePreview('night')">深夜</button>
          </div>

          <div class="hero-center">
            <h1 class="hero-title" id="hero-title">Waiting</h1>
            <div class="hero-title-rule"></div>
            <div class="hero-artist" id="hero-artist">Claudio FM</div>
            <div class="hero-commentary" id="hero-commentary"></div>
          </div>
        </section>

        <div class="progress-wrap">
          <div class="progress-line" id="progress-line">
            <div class="progress-line-fill" id="progress-fill"></div>
          </div>
          <div class="progress-meta">
            <span id="time-cur">0:00</span>
            <span id="time-total">0:00</span>
          </div>
        </div>

        <div class="controls">
          <button class="control-btn" id="btn-prev" aria-label="Previous">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.45" stroke-linecap="round" stroke-linejoin="round"><path d="M17 6L9 12L17 18"></path><path d="M8 6V18"></path></svg>
          </button>
          <button class="control-btn" id="btn-play" aria-label="Play or Pause">
            <svg id="btn-play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.45" stroke-linecap="round" stroke-linejoin="round"><path d="M9 7L17 12L9 17Z"></path></svg>
          </button>
          <button class="control-btn" id="btn-next" aria-label="Next">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.45" stroke-linecap="round" stroke-linejoin="round"><path d="M7 6L15 12L7 18"></path><path d="M16 6V18"></path></svg>
          </button>
          <button class="control-btn" id="btn-note" aria-label="Explain">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.45" stroke-linecap="round" stroke-linejoin="round"><path d="M16 6V14.2C16 15.75 14.66 17 13 17C11.34 17 10 15.75 10 14.2C10 12.65 11.34 11.4 13 11.4C13.56 11.4 14.09 11.54 14.53 11.8V8.3L9 9.6V16.2C9 17.75 7.66 19 6 19C4.34 19 3 17.75 3 16.2C3 14.65 4.34 13.4 6 13.4C6.56 13.4 7.09 13.54 7.53 13.8V8.2L16 6Z"></path></svg>
          </button>
          <button class="control-btn" id="btn-dislike" aria-label="Dislike">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.45" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7L17 17"></path><path d="M17 7L7 17"></path></svg>
          </button>
          <button class="control-btn" id="btn-heart" aria-label="Like">

  const state = {

  function makeId(prefix) {
    return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`
  }

  function makeTrackExplainKey(item) {
    if (!item || !item.song_info) return ''
    const role = item.queue_meta && item.queue_meta.batch_role ? item.queue_meta.batch_role : 'default'
    return `${item.song_info.id || item.song_info.name}::${role}`
  }

  function makeTrackKey(track) {
    if (!track) return ''
    return `${track.id || track.name}::${track.artist || ''}`
  }

  function ts(date = new Date()) {
    return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`
  }

  function fmt(sec) {
    if (!sec || Number.isNaN(sec)) return '0:00'
    const minutes = Math.floor(sec / 60)
    const seconds = Math.floor(sec % 60)
    return `${minutes}:${String(seconds).padStart(2, '0')}`
  }

  function hhmmToMinutes(text) {
    if (!text || !/^\d{2}:\d{2}$/.test(text)) return null
    const parts = text.split(':').map(Number)
    return parts[0] * 60 + parts[1]
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value))
  }

  function hexToRgb(hex) {
    const value = hex.replace('#', '')
    const size = value.length === 3 ? 1 : 2
    const expand = (segment) => size === 1 ? segment + segment : segment
    return {
      r: parseInt(expand(value.slice(0, size)), 16),
      g: parseInt(expand(value.slice(size, size * 2)), 16),
      b: parseInt(expand(value.slice(size * 2, size * 3)), 16),
    }
  }

  function parseColor(color) {
    if (!color) return { r: 0, g: 0, b: 0, a: 1 }
    if (color.startsWith('#')) {
      const rgb = hexToRgb(color)
      return { ...rgb, a: 1 }
    }
    const rgba = color.match(/rgba?\(([^)]+)\)/i)
    if (!rgba) return { r: 0, g: 0, b: 0, a: 1 }
    const parts = rgba[1].split(',').map(part => Number(part.trim()))
    return {
      r: parts[0] || 0,
      g: parts[1] || 0,
      b: parts[2] || 0,
      a: parts.length > 3 ? parts[3] : 1,
    }
  }

  const _colorCache = {}
  function cachedParseColor(colorStr) {
    if (_colorCache[colorStr]) return _colorCache[colorStr]
    _colorCache[colorStr] = parseColor(colorStr)
    return _colorCache[colorStr]
  }

  function mixColor(a, b, t) {
    const c1 = cachedParseColor(a)
    const c2 = cachedParseColor(b)
    const mix = (x, y) => x + (y - x) * t
    return `rgba(${Math.round(mix(c1.r, c2.r))}, ${Math.round(mix(c1.g, c2.g))}, ${Math.round(mix(c1.b, c2.b))}, ${mix(c1.a, c2.a).toFixed(4)})`
  }

  function getPhaseWindows(nowMs, sunriseTs, sunsetTs) {
    const defaultSunrise = Math.floor(nowMs / 86400000) * 86400000 / 1000 + 6 * 3600
    const defaultSunset = Math.floor(nowMs / 86400000) * 86400000 / 1000 + 18 * 3600
    const sunrise = (sunriseTs || defaultSunrise) * 1000
    const sunset = (sunsetTs || defaultSunset) * 1000

    return [
      { key: 'sunrise', start: sunrise - 40 * 60000, end: sunrise + 70 * 60000 },
      { key: 'morning', start: sunrise + 70 * 60000, end: new Date(nowMs).setHours(11, 30, 0, 0) },
      { key: 'noon', start: new Date(nowMs).setHours(11, 30, 0, 0), end: new Date(nowMs).setHours(14, 30, 0, 0) },
      { key: 'sunset', start: new Date(nowMs).setHours(14, 30, 0, 0), end: sunset + 40 * 60000 },
    ]
  }

  function resolveThemeKey(now, sunrise, sunset, sunriseTs, sunsetTs) {
    if (forcedThemeKey) return forcedThemeKey
    const nowMs = now.getTime()
    const windows = getPhaseWindows(nowMs, sunriseTs, sunsetTs)
    const dayPhase = windows.find(window => nowMs >= window.start && nowMs < window.end)
    return dayPhase ? dayPhase.key : 'night'
  }

  function getPhaseProgress(phaseKey, nowMs, sunriseTs, sunsetTs) {
    const windows = getPhaseWindows(nowMs, sunriseTs, sunsetTs)
    const window = windows.find(item => item.key === phaseKey)
    if (!window) return 0
    return clamp((nowMs - window.start) / Math.max(1, window.end - window.start), 0, 1)
  }

  function getThemeState(themeKey, nowMs) {
    const theme = VISUAL_PHASES[themeKey] || VISUAL_PHASES.night
    let bg = theme.bg || '#080808'
    let bgGradient = theme.bgGradient || null
    if (themeKey === 'sunrise') {
      const progress = getPhaseProgress('sunrise', nowMs, state.sunriseTs, state.sunsetTs)
      bg = mixColor(theme.bgStart, theme.bgEnd, progress)
      bgGradient = theme.bgGradient || null
    }
    return {
      accent: theme.accent,
      textMain: theme.textMain,
      textSub: theme.textSub,
      textDim: theme.textDim,
      line: theme.line,
      surface: theme.surface,
      surface2: theme.surface2,
      bubbleDj: theme.bubbleDj,
      bubbleCommentary: theme.bubbleCommentary,
      bubbleYou: theme.bubbleYou,
      control: theme.control,
      bg,
      bgGradient,
    }
  }

  function getAdjacentThemeKeys(themeKey) {
    const order = ['night', 'sunrise', 'morning', 'noon', 'sunset', 'night']
    const index = order.indexOf(themeKey)
    if (index === -1) return { prev: 'night', next: 'night' }
    return {
      prev: order[Math.max(0, index - 1)],
      next: order[Math.min(order.length - 1, index + 1)],
    }
  }

  function getInterpolatedThemeState(nowMs) {
    const themeKey = resolveThemeKey(new Date(nowMs), state.sunrise, state.sunset, state.sunriseTs, state.sunsetTs)
    const themeState = getThemeState(themeKey, nowMs)
    if (forcedThemeKey) return { themeKey, themeState, transitioning: false }

    const windows = getPhaseWindows(nowMs, state.sunriseTs, state.sunsetTs)
    const currentWindow = windows.find(item => item.key === themeKey)
    if (!currentWindow) return { themeKey, themeState, transitioning: false }

    const transitionDuration = 8 * 60000
    const { prev } = getAdjacentThemeKeys(themeKey)
    if (nowMs - currentWindow.start < transitionDuration) {
      const prevState = getThemeState(prev, nowMs)
      const t = clamp((nowMs - currentWindow.start) / transitionDuration, 0, 1)
      const keys = Object.keys(themeState).filter(key => key !== 'bgGradient')
      const blended = { bgGradient: t > 0.5 ? themeState.bgGradient : prevState.bgGradient }
      for (const key of keys) blended[key] = mixColor(prevState[key], themeState[key], t)
      return { themeKey, themeState: blended, transitioning: true }
    }

    return { themeKey, themeState, transitioning: false }
  }

  function setTheme(theme, themeKey) {
    const root = document.documentElement
    root.style.setProperty('--bg', theme.bg)
    root.style.setProperty('--accent', theme.accent)
    root.style.setProperty('--text-main', theme.textMain)
    root.style.setProperty('--text-sub', theme.textSub)
    root.style.setProperty('--text-dim', theme.textDim)
    root.style.setProperty('--line', theme.line)
    root.style.setProperty('--surface', theme.surface)
    root.style.setProperty('--surface-2', theme.surface2)
    root.style.setProperty('--bubble-dj', theme.bubbleDj)
    root.style.setProperty('--bubble-commentary', theme.bubbleCommentary)
    root.style.setProperty('--bubble-you', theme.bubbleYou)
    root.style.setProperty('--control', theme.control)
    root.style.setProperty('--control-hover', theme.accent)
    document.body.style.background = theme.bg
    app.style.background = theme.bgGradient || theme.bg
    const fillEl = document.getElementById('progress-fill')
    if (fillEl) {
      const gradients = {
        sunrise: 'linear-gradient(to right, #8A5A3A, #D4956A)',
        morning: 'linear-gradient(to right, #B8965A, #D4B878)',
        noon: 'linear-gradient(to right, #A07840, #C09A58)',
        sunset: 'linear-gradient(to right, #8A3A1A, #D4845A)',
        night: 'linear-gradient(to right, #4A3A28, #C9A96E)',
      }
      fillEl.style.background = gradients[themeKey] || gradients.night
    }
  }

  function escapeHtml(text) {
    return String(text || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;')
  }

  function updatePlayIcon() {
    playIcon.setAttribute('fill', state.playing ? 'none' : 'currentColor')
    playIcon.innerHTML = state.playing
      ? '<path d="M9 7V17"></path><path d="M15 7V17"></path>'

  function renderHero() {
    heroTime.textContent = ts(state.now)
    heroTitle.textContent = state.currentTrack && state.currentTrack.name ? state.currentTrack.name : 'Waiting'
    const titleLen = heroTitle.textContent.length

      heroTitle.style.lineHeight = '1.0'
    } else {
      heroTitle.style.fontSize = 'clamp(22px, 4.2vw, 30px)'
      heroTitle.style.lineHeight = '1.1'
    }
    heroArtist.textContent = state.currentTrack && state.currentTrack.artist ? state.currentTrack.artist : 'Claudio FM'
    const city = state.weather && (state.weather.city || state.weather.locationName)

    heroCommentary.textContent = state.heroCommentary || ''
    heroCommentary.classList.toggle('visible', Boolean(state.heroCommentary))

  function renderThemePreview() {
    const buttons = themePreview.querySelectorAll('[data-theme-preview]')
    buttons.forEach((button) => {
      button.classList.toggle('active', button.getAttribute('data-theme-preview') === forcedThemeKey)
    })
  }

  function applyForcedTheme(nextTheme) {
    forcedThemeKey = forcedThemeKey === nextTheme ? null : nextTheme
    const visualTheme = getInterpolatedThemeState(Date.now())
    state.themeKey = visualTheme.themeKey
    setTheme(visualTheme.themeState, visualTheme.themeKey)
    if (state.weather) initCloudSystem(state.weather, state.astronomy)

  function renderProgress() {
    const ratio = state.duration ? Math.max(0, Math.min(1, state.progress / state.duration)) : 0

  function renderQueue() {
    queueCount.textContent = `${state.queue.length} TRACKS`

  function renderMessages() {
    messageList.innerHTML = state.messages.map((message) => {
      const isYou = message.from === 'user'

            ${message.replayUrl ? `<button class="msg-replay" data-replay="${escapeHtml(message.replayUrl)}" data-duck="${commentary ? '1' : '0'}">REPLAY</button>` : ''}
          </div>
        </div>
      `
    }).join('')
    chatScroll.scrollTop = chatScroll.scrollHeight
  }

  function renderControls() {
    composerInput.disabled = state.isLoading
    composerSend.disabled = state.isLoading || !composerInput.value.trim()
    noteButton.disabled = !state.currentTrack || !state.currentTrack.name || state.isExplaining

    heartButton.style.color = state.currentFeedback === 'like' ? 'var(--accent)' : ''
